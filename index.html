<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究报告 — AI 产品增长手册</title>
<meta name="description" content="深度研究报告合集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface-raised: #18181a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e8e8ee;
  --text-secondary: #8a8a9a;
  --text-muted: #5a5a6a;
  --accent: #0ea5e9;
  --accent-glow: rgba(14,165,233,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.024'/%3E%3C/svg%3E") repeat;
  pointer-events: none;
  z-index: 9999;
}
.container { max-width: 800px; margin: 0 auto; padding: 60px 24px; }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 8px;
}
.subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 40px; }
.divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:32px 0; }
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  text-decoration: none;
  color: inherit;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: var(--border-hover);
  background: var(--surface-raised);
}
.card::after {
  content: '\f061';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  opacity: 0;
  transition: all .3s;
}
.card:hover::after { opacity: 1; right: 20px; }
.card-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  margin-bottom: 12px;
  background: var(--accent-glow);
  color: var(--accent);
}
.card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  padding-right: 40px;
}
.card p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
.card-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.card-meta span { display: flex; align-items: center; gap: 4px; }
.status-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.status-live { background: rgba(16,185,129,0.15); color: #10b981; }
@media (max-width:600px) {
  .container { padding: 40px 16px; }
  h1 { font-size: 28px; }
  .card { padding: 20px; }
  .card h2 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>研究报告</h1>
  <p class="subtitle">AI 产品增长相关的深度研究报告合集</p>
  <div class="divider"></div>

  <a class="card" href="/ai-product-growth/">
    <div class="card-tag"><i class="fas fa-book-open" style="margin-right:4px"></i> 持续更新</div>
    <h2>AI 产品增长手册</h2>
    <p>从 SEO 到 GEO，从定价到 PLG——AI 产品的系统性增长指南。涵盖技术 SEO、内容策略、SGE/AI Overviews、GEO 方法论、GEO 内容与技术实现、GEO 度量体系，以及定价策略、PLG、社区增长等 16 个章节。</p>
    <div class="card-meta">
      <span><i class="far fa-file-alt"></i> 16 章</span>
      <span><i class="fas fa-tag"></i> v1.0</span>
      <span><span class="status-chip status-live">7 章已发布</span></span>
    </div>
  </a>
</div>
</body>
</html>
