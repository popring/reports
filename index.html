<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f6f2;color:#1a1a1a;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:80px 32px}
h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.subtitle{color:#888;font-size:15px;margin-bottom:48px}
.card{display:flex;background:#fff;border:1px solid #eee;border-radius:16px;padding:32px;text-decoration:none;color:inherit;transition:all .25s;align-items:flex-start;gap:20px}
.card:hover{border-color:#ddd;box-shadow:0 4px 24px rgba(0,0,0,0.04);transform:translateY(-2px)}
.card-left{width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff}
.card-body{flex:1}
.card-body h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:6px}
.card-body p{font-size:14px;color:#666;line-height:1.6;margin-bottom:12px}
.meta{display:flex;gap:16px;font-size:12px;color:#999;flex-wrap:wrap}
.meta span{display:flex;align-items:center;gap:5px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(16,185,129,0.12);color:#10b981;text-transform:uppercase;letter-spacing:.3px}
@media(max-width:600px){.container{padding:48px 20px}h1{font-size:28px}.card{padding:20px}}
</style>
</head>
<body>
<div class="container">
  <h1>研究报告</h1>
  <p class="subtitle">AI 产品增长相关的深度研究报告合集</p>
  <a class="card" href="ai-product-growth/">
    <div class="card-left"><i class="fas fa-book-open"></i></div>
    <div class="card-body">
      <h2>AI 产品增长手册</h2>
      <p>从 SEO 到 GEO，从定价到 PLG——AI 产品的系统性增长指南。16 个章节，涵盖技术 SEO、内容策略、SGE、GEO 方法论、定价策略、PLG、社区增长等。</p>
      <div class="meta"><span><i class="far fa-file-alt"></i> 16 章</span><span class="badge">7 章已发布</span></div>
    </div>
  </a>
</div>
</body>
</html>
