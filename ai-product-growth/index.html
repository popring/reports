<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8">

<style>
:root,[data-theme=light]{--bg:#f6f5f1;--bg-sidebar:#faf9f5;--surface:#fff;--surface-hover:#f3f2ed;--border:#e2e0da;--text:#1c1b1a;--text-secondary:#5c5b58;--text-muted:#8f8e8b;--accent:#097abb;--accent2:#0d9488}
[data-theme=dark]{--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]):not([data-theme=dark]){--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.2;color:var(--text)}h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin:24px 0 10px;color:var(--text)}
h3{font-size:15px;font-weight:600;margin:18px 0 8px;color:var(--text)}h4{font-size:14px;font-weight:600;margin:14px 0 6px}
p{font-size:14px;color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text);font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--accent)}
pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-home{color:var(--accent);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
.tm{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:6px 10px;font-size:13px;cursor:pointer}
.tm:hover{border-color:var(--border);color:var(--text)}
.lt{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sb{width:260px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:10px 0}
.sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.gr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 20px 4px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.gr .dt{width:6px;height:6px;border-radius:50%;display:inline-block}
.l1{font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .12s;cursor:pointer;user-select:none}
.l1h{display:flex;align-items:center;gap:5px;padding:5px 16px 5px 28px}
.l1h:hover{background:var(--surface-hover);color:var(--text)}
.l1.active .l1h{color:var(--text);font-weight:600;background:var(--surface);border-left-color:var(--accent);border-left:3px solid var(--accent);margin-left:-3px;padding-left:28px}
.l1.cs{opacity:.45}
.l1 .ar{font-size:8px;width:12px;text-align:center;color:var(--text-dim);transition:transform .2s}
.l1 .ar.op{transform:rotate(90deg)}
.l1 .ic{font-size:11px;width:14px;text-align:center;flex-shrink:0}
.l2{display:flex;align-items:center;padding:3px 16px 3px 50px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.l2:hover{color:var(--text-secondary)}
.l2.act{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sw{display:none}.sw.op{display:block}
.mn{flex:1;padding:28px 44px 80px;max-width:920px;background:var(--surface);min-height:calc(100vh - 52px)}
.scn{display:none}.scn.act{display:block}@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scn.act{animation:fd .22s ease}
.ch-hd{margin-bottom:20px}
.ch-tg{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ch-tt{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.15;color:var(--text)}
.cd{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.ch{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
.scd{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.sv{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sl{font-size:10px;color:var(--text-muted);margin-top:4px}
.tw{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface-hover)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin:10px 0}
.tcd{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.tn{font-weight:600;font-size:12px}.tds{font-size:11px;color:var(--text-muted)}
ul,ol{margin:8px 0 14px;padding-left:20px;color:var(--text-secondary);font-size:14px;line-height:1.8}
li{margin-bottom:4px}
.hl{border-radius:8px;padding:16px 18px;margin:14px 0;border:1px solid}.hl p:last-child{margin-bottom:0}
.dv{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:28px 0}
.csb{border:1px dashed var(--border);border-radius:8px;padding:24px 20px;text-align:center;margin:12px 0;background:var(--bg)}
@media(max-width:900px){.sb{display:none}.mn{padding:24px 18px 60px}}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr)}.ch-tt{font-size:20px}h1{font-size:22px}}
</style>

    'schema': {t:'结构化数据', h:'<h3>结构化数据 (Schema.org)</h3><p>帮助搜索引擎理解内容语境，直接影响Rich Snippets和AI引擎的RAG检索质量。</p><div class="tw"><table><tr><th>类型</th><th>用途</th><th>重要度</th></tr><tr><td><code>FAQPage</code></td><td>问答对提取</td><td>⭐⭐⭐⭐⭐</td></tr><tr><td><code>HowTo</code></td><td>教程步骤</td><td>⭐⭐⭐⭐⭐</td></tr><tr><td><code>SoftwareApplication</code></td><td>AI产品页</td><td>⭐⭐⭐⭐⭐</td></tr></table></div>'},

// ===== ROUTING =====
function findNode(slug){
  for(var g=0;g<TREE.length;g++)
    for(var k=0;k<TREE[g].kids.length;k++)
      if(TREE[g].kids[k].slug===slug) return {g,k};
  return null;
}

function getRoute(){
  var h=location.hash.replace('#/','').replace(/\/$/,'');
  if(!h) return {g:-1,k:-1,s2:-1};
  var p=h.split('/');
  var n=findNode(p[0]);
  if(!n) return {g:-1,k:-1,s2:-1};
  var d=DATA[p[0]];
  if(!p[1]||!d||!d.sections) return {g:n.g,k:n.k,s2:-1};
  var slugs=Object.keys(d.sections);
  var idx=slugs.indexOf(p[1]);
  return {g:n.g,k:n.k,s2:idx>=0?idx:-1};
}

function pushRoute(g,k,s2){
  if(g<0||k<0){location.hash='';document.title='AI 产品增长手册';return;}
  var kid=TREE[g].kids[k];
  var secSlug='';
  if(s2>=0&&DATA[kid.slug]&&DATA[kid.slug].sections){
    var slugs=Object.keys(DATA[kid.slug].sections);
    if(s2<slugs.length) secSlug=slugs[s2];
  }
  location.hash='/'+kid.slug+(secSlug?'/'+secSlug:'');
  document.title=kid.title+' · AI 产品增长手册';
}

var shtml='<div style="padding:6px 20px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted)"><i class="fas fa-list"></i> 目录</div>';

// ===== NAVIGATION =====
function nav(gi,ki,s2){
  // Hide all chapters and hero
  document.querySelectorAll('#hp,.chunk').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.scn').forEach(function(el){el.classList.remove('act');});
  // Reset sidebar
  document.querySelectorAll('.l1').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.l2').forEach(function(el){el.classList.remove('act');});
  document.querySelectorAll('.sw').forEach(function(el){el.classList.remove('op');});
  document.querySelectorAll('.ar').forEach(function(el){el.classList.remove('op');});

  if(gi<0||ki<0){
    document.getElementById('hp').style.display='flex';
    pushRoute(-1,-1);
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  // Show chapter
  var ch=document.getElementById('chk'+gi+'-'+ki);
  if(!ch){document.getElementById('hp').style.display='flex';pushRoute(-1,-1);return;}
  ch.style.display='block';

  // L1 active
  var l1=document.querySelector('.l1[data-g="'+gi+'"][data-k="'+ki+'"]');
  if(l1) l1.classList.add('active');
  // Open L2
  var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');
  var ar=document.querySelector('[data-gi="'+gi+'"][data-ki="'+ki+'"]');
  if(sw){sw.classList.add('op');if(ar)ar.classList.add('op');}

  // Show section
  if(s2!==undefined&&s2>=0){
    var sec=document.getElementById('sec'+gi+'-'+ki+'-'+s2);
    if(sec){
      sec.classList.add('act');
      var l2=document.querySelector('.l2[data-g="'+gi+'"][data-k="'+ki+'"][data-s="'+s2+'"]');
      if(l2){
        document.querySelectorAll('.l2[data-g="'+gi+'"][data-k="'+ki+'"]').forEach(function(el){el.classList.remove('act');});
        l2.classList.add('act');
      }
    }
  }
  pushRoute(gi,ki,s2);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Initial
var r=getRoute();curNav={g:r.g,k:r.k,s2:r.s2};nav(r.g,r.k,r.s2);

// Click handler
sb.addEventListener('click',function(e){
  var l2=e.target.closest('.l2');
  var l1h=e.target.closest('.l1');
  var ar=e.target.closest('.ar');
  if(ar){
    var gi=parseInt(ar.dataset.gi),ki=parseInt(ar.dataset.ki);
    document.querySelector('[data-sw="'+gi+'-'+ki+'"]').classList.toggle('op');
    ar.classList.toggle('op');
    return;
  }
  if(l2){
    nav(parseInt(l2.dataset.g),parseInt(l2.dataset.k),parseInt(l2.dataset.s));
    return;
  }
  if(l1h&&!l1h.classList.contains('cs')){
    var g=parseInt(l1h.dataset.g),k=parseInt(l1h.dataset.k);
    nav(g,k);
  }
});

window.addEventListener('hashchange',function(){
  var r2=getRoute();
  if(r2.g===curNav.g&&r2.k===curNav.k&&r2.s2===curNav.s2)return;
  curNav={g:r2.g,k:r2.k,s2:r2.s2};
  nav(r2.g,r2.k,r2.s2);
});
})();
</script>
