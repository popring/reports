}
[data-theme=dark] {
  --bg:#1a1a1e; --bg-sidebar:#1f1f23; --surface:#27272b; --surface-hover:#2f2f33; --border:#37373b; --border-raised:#47474b;

  --shadow:rgba(0,0,0,0.16); --shadow-hover:rgba(0,0,0,0.24);
}

html{scroll-behavior:smooth}

pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-home{color:var(--accent);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
.theme-toggle{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:6px 10px;font-size:13px;cursor:pointer;transition:all .15s}
.theme-toggle:hover{border-color:var(--border-raised);color:var(--text)}

/* LAYOUT */
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:250px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:12px 0}
.sidebar-label{padding:6px 20px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted)}
.tree-item{cursor:pointer;user-select:none}
.tree-l1{display:flex;align-items:center;gap:6px;padding:6px 16px 6px 20px;font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .12s}
.tree-l1:hover{background:var(--surface-hover);color:var(--text)}
.tree-l1.active{color:var(--text);font-weight:600;background:var(--surface);border-left-color:var(--accent)}

.ch-page{display:none;animation:fadeIn .22s ease}

  btn.addEventListener('click', ()=>{
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : current === 'light' ? 'system' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon(next);

// ===== ROUTING =====
function getRoute(){
  const p = window.location.pathname;
  const m = p.match(/\/ai-product-growth\/([^\/]+)(?:\/([^\/]+))?/);
  if(!m) return { ch:0, s2:-1 };
  const chSlug = m[1];
  const s2Slug = m[2] || '';
  const chIdx = slugs.ch.findIndex(c => c.slug === chSlug);
  if(chIdx < 0) return { ch:0, s2:-1 };
  if(!s2Slug) return { ch:chIdx, s2:-1 };
  const s2Idx = slugs.ch[chIdx].sections.findIndex(s => s.slug === s2Slug);
  return { ch:chIdx, s2:s2Idx >= 0 ? s2Idx : -1 };
}

function pushRoute(ch, s2){
  const base = window.location.pathname.replace(/\/reports\/ai-product-growth.*/,'/reports/ai-product-growth');
  const chSlug = slugs.ch[ch].slug;
  const s2Slug = s2 >= 0 && slugs.ch[ch].sections[s2] ? slugs.ch[ch].sections[s2].slug : '';
  const url = base + '/' + chSlug + (s2Slug ? '/' + s2Slug : '') + '/';
  const path = url.replace(/\/+/g,'/');
  history.pushState({ch,s2}, '', path);
  document.title = (s2 >= 0 && s2Slug ? slugs.ch[ch].sections[s2].title+' · ' : '') +
    (ch > 0 ? slugs.ch[ch].title+' · ' : '') + 'AI 产品增长手册';
}

function chTag(idx){

// ===== INIT & NAVIGATION =====
buildAllContent();

function navigate(ch, s2){
  // Show page
  document.querySelectorAll('.ch-page').forEach(p=>p.classList.remove('active'));
  const page = document.getElementById('page-'+ch);
  if(page) page.classList.add('active');

  // Sidebar L1
  document.querySelectorAll('.tree-l1').forEach(el=>{
    el.classList.remove('active');
    if(parseInt(el.dataset.ch)===ch) el.classList.add('active');
  });

  // Sub-menu
  document.querySelectorAll('.sub-wrap').forEach(w=>{
    w.classList.remove('open');
    w.querySelectorAll('.tree-l2').forEach(x=>x.classList.remove('active'));
  });
  document.querySelectorAll('.arrow').forEach(a=>a.classList.remove('open'));

  const sub = document.querySelector('.sub-wrap[data-sub="'+ch+'"]');
  const arrow = document.querySelector('[data-arrow="'+ch+'"]');
  if(sub){ sub.classList.add('open'); if(arrow) arrow.classList.add('open'); }

  // Sub-section active
  if(s2 !== undefined && s2 >= 0){
    const el = document.querySelector('.tree-l2[data-ch="'+ch+'"][data-s2="'+s2+'"]');
    if(el){
      document.querySelectorAll('.tree-l2[data-ch="'+ch+'"]').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
    }
  }

  pushRoute(ch, s2);
}

// Build sidebar
(function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-label"><i class="fas fa-list"></i> 目录</div>';
  slugs.ch.forEach((ch,i)=>{
    if(i===0) return;
    const aro = ch.sections.length && !ch.cs ? '<span class="arrow" data-arrow="'+i+'"><i class="fas fa-chevron-right"></i></span>' : '';
    const ico = '<span class="ico"><i class="fas '+ch.icon+'" style="color:'+ch.color+'"></i></span>';
    const csb = ch.cs ? '<span class="badge-cs">CS</span>' : '';
    sb.innerHTML += '<div class="tree-item"><div class="tree-l1'+(ch.cs?' cs':'')+'" data-ch="'+i+'">'+aro+ico+'<span>'+ch.title+'</span>'+csb+'</div>';
    if(ch.sections.length && !ch.cs){
      sb.innerHTML += '<div class="sub-wrap" data-sub="'+i+'">';
      ch.sections.forEach((s,j)=>{
        sb.innerHTML += '<div class="tree-l2" data-ch="'+i+'" data-s2="'+j+'">'+s.title+'</div>';
      });
      sb.innerHTML += '</div>';
    }
    sb.innerHTML += '</div>';
  });
})();

// Click delegation
document.getElementById('sidebar').addEventListener('click', function(e){
  const l1 = e.target.closest('.tree-l1');
  const l2 = e.target.closest('.tree-l2');
  const arrow = e.target.closest('.arrow');
  if(arrow){
    const idx = parseInt(arrow.parentElement.dataset.ch);
    const sub = document.querySelector('.sub-wrap[data-sub="'+idx+'"]');
    if(sub){ sub.classList.toggle('open'); arrow.classList.toggle('open'); }
    return;
  }
  if(l2){
    navigate(parseInt(l2.dataset.ch), parseInt(l2.dataset.s2));
    return;
  }
  if(l1 && !l1.classList.contains('cs')) navigate(parseInt(l1.dataset.ch));
});

// SPA redirect fix: check if redirected from 404.html
const redirectPath = sessionStorage.getItem('spaRedirect');
if (redirectPath) {
  sessionStorage.removeItem('spaRedirect');
  // Parse the redirected path to extract route (it already has the full path)
  // Replace current history entry silently
  history.replaceState(null, '', redirectPath);
}

// Route on load
const route = getRoute();
navigate(route.ch, route.s2);

// PopState (browser back/forward)
window.addEventListener('popstate', function(){
  const r = getRoute();
  navigate(r.ch, r.s2);
});

})();
