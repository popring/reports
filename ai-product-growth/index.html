<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品增长手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root,[data-theme=light]{--bg:#f6f5f1;--bg-sidebar:#faf9f5;--surface:#fff;--surface-hover:#f3f2ed;--border:#e2e0da;--text:#1c1b1a;--text-secondary:#5c5b58;--text-muted:#8f8e8b;--accent:#097abb;--accent2:#0d9488}
[data-theme=dark]{--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]):not([data-theme=dark]){--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.2;color:var(--text)}h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin:24px 0 10px;color:var(--text)}
h3{font-size:15px;font-weight:600;margin:18px 0 8px;color:var(--text)}h4{font-size:14px;font-weight:600;margin:14px 0 6px}
p{font-size:14px;color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text);font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--accent)}
pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-home{color:var(--accent);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
.tm{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:6px 10px;font-size:13px;cursor:pointer}
.tm:hover{border-color:var(--border);color:var(--text)}
.lt{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sb{width:260px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:10px 0}
.sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.gr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 20px 4px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.gr .dt{width:6px;height:6px;border-radius:50%;display:inline-block}
.l1{font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .12s;cursor:pointer;user-select:none}
.l1h{display:flex;align-items:center;gap:5px;padding:5px 16px 5px 28px}
.l1h:hover{background:var(--surface-hover);color:var(--text)}
.l1.active .l1h{color:var(--text);font-weight:600;background:var(--surface);border-left-color:var(--accent);border-left:3px solid var(--accent);margin-left:-3px;padding-left:28px}
.l1.cs{opacity:.45}
.l1 .ar{font-size:8px;width:12px;text-align:center;color:var(--text-dim);transition:transform .2s}
.l1 .ar.op{transform:rotate(90deg)}
.l1 .ic{font-size:11px;width:14px;text-align:center;flex-shrink:0}
.l2{display:flex;align-items:center;padding:3px 16px 3px 50px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.l2:hover{color:var(--text-secondary)}
.l2.act{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sw{display:none}.sw.op{display:block}
.mn{flex:1;padding:28px 44px 80px;max-width:920px;background:var(--surface);min-height:calc(100vh - 52px)}
.scn{display:none}.scn.act{display:block}@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scn.act{animation:fd .22s ease}
.ch-hd{margin-bottom:20px}
.ch-tg{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ch-tt{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.15;color:var(--text)}
.cd{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.ch{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
.scd{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.sv{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sl{font-size:10px;color:var(--text-muted);margin-top:4px}
.tw{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface-hover)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin:10px 0}
.tcd{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.tn{font-weight:600;font-size:12px}.tds{font-size:11px;color:var(--text-muted)}
ul,ol{margin:8px 0 14px;padding-left:20px;color:var(--text-secondary);font-size:14px;line-height:1.8}
li{margin-bottom:4px}
.hl{border-radius:8px;padding:16px 18px;margin:14px 0;border:1px solid}.hl p:last-child{margin-bottom:0}
.dv{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:28px 0}
.csb{border:1px dashed var(--border);border-radius:8px;padding:24px 20px;text-align:center;margin:12px 0;background:var(--bg)}
@media(max-width:900px){.sb{display:none}.mn{padding:24px 18px 60px}}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr)}.ch-tt{font-size:20px}h1{font-size:22px}}
</style>
</head>
<body>
<div class="topbar">
<a class="topbar-home" href="../../"><i class="fas fa-arrow-left"></i><span> 报告索引</span></a>
<span class="topbar-title">AI 产品增长手册</span>
<button class="tm" id="tt"><i class="fas fa-moon"></i></button>
</div>
<div class="lt"><div class="sb" id="sb"></div><div class="mn" id="mn"></div></div>
<script>
(function(){
// Theme
(function(){const s=localStorage.getItem('t');if(s)document.documentElement.setAttribute('data-theme',s);const b=document.getElementById('tt');b.onclick=()=>{const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':c==='light'?'system':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('t',n);b.innerHTML=n==='dark'?'<i class="fas fa-sun"></i>':n==='light'?'<i class="fas fa-sun-bright"></i>':'<i class="fas fa-desktop"></i>'}})();

// ==== DATA ====
// tag helper
function tg(c,s){return'<span class="ch-tg" style="background:'+(c==='#097abb'?'rgba(9,122,187,0.08);color:#097abb;border-color:rgba(9,122,187,0.15)':c==='#0d9488'?'rgba(13,148,136,0.08);color:#0d9488;border-color:rgba(13,148,136,0.15)':'color-mix(in srgb,'+c+'10%,transparent);color:'+c+';border-color:color-mix(in srgb,'+c+'18%,transparent)')+'"><i class="fas '+s+'"></i></span>';}

// Chapter data: {slug, tag, tagIcon, groupColor, headerHTML, sections:{slug:{t:title, h:html}}}
const DATA = {};

DATA['seo-tech'] = {
  tag: 'SEO', tagIcon: 'fa-code', color: '#097abb',
  header: '<div class="sg"><div class="scd"><div class="sv" style="color:#097abb">2.5s</div><div class="sl">LCP</div></div><div class="scd"><div class="sv" style="color:#097abb">200ms</div><div class="sl">INP</div></div><div class="scd"><div class="sv" style="color:#097abb">0.1</div><div class="sl">CLS</div></div></div>',
  sections: {
    '抓取与索引': {t:'抓取与索引', h:'<h3>抓取与索引全面指南</h3>\n<p>搜索引擎通过爬虫程序遍历网页链接，读取页面内容后存入索引库。如果爬虫无法访问你的页面，内容再好在搜索结果中也看不到。据统计，约68%的网站存在爬虫预算浪费问题。</p>\n<h4>GSC索引状态深度解读</h4>\n<p>打开Google Search Console → 页面索引标签 → 查看各状态的具体页面数量。常见状态及其修复方法：</p>\n<div class="tw"><table><tr><th>GSC状态</th><th>含义</th><th>修复方法</th></tr>\n<tr><td>已发现但未索引</td><td>Google知道页面存在但尚未决定编入索引</td><td>增加内链提升页面重要性，确保内容有独到价值，提交URL手动请求索引</td></tr>\n<tr><td>已抓取但未索引</td><td>页面已被爬虫访问但不符合索引标准</td><td>检查内容质量是否足够，是否为thin content，是否有重复内容问题</td></tr>\n<tr><td>404未找到</td><td>页面返回404状态码</td><td>如果页面已删除，设置301重定向到最相关的内容页面</td></tr>\n<tr><td>软404</td><td>页面返回200但实际没有有意义的内容</td><td>改为真实404或301，或补充完整的内容</td></tr></table></div>\n<h4>爬虫预算管理实操</h4>\n<p>Googlebot每天对每个站点分配有限的爬虫预算。你需要确保最重要的页面被优先爬取。</p>\n<div class="cd"><div class="ch" style="color:#097abb">影响爬虫预算的关键因素</div>\n<ol style="margin:0"><li><strong>网站规模</strong> — 超过500页的网站需要主动管理爬虫预算</li>\n<li><strong>内容更新频率</strong> — 新闻站和电商站需要爬虫频繁回来检查，更新越频繁爬虫来得越多</li>\n<li><strong>服务器响应速度</strong> — TTFB超过200ms会导致爬虫降低抓取频率，建议控制在200ms以内</li>\n<li><strong>抓取错误率</strong> — 大量5xx错误会让爬虫减少抓取，需监控服务器稳定性</li></ol></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-terminal"></i> 抓取预算检查命令</div>\n<pre><code>GSC → 设置 → 抓取统计报告\n正常指标：\n- 日均抓取页数：500-2000页/天（中小型站）\n- 平均抓取时间：&lt;1.5秒/页\n- TTFB：&lt;200ms\n- 抓取错误率：&lt;5%\n\n如果日均抓取量持续下降→可能存在爬虫预算问题</code></pre></div>'},
    'AI爬虫管理': {t:'AI爬虫管理', h:'<h3>AI爬虫管理完整指南</h3>\n<p>随着AI搜索引擎的崛起，管理各类爬虫对你网站的访问变得前所未有的重要。核心原则：允许有价值的内容被爬取以获取AI引用机会，同时保护敏感路径不被访问。</p>\n<h4>主要AI爬虫及管理策略</h4>\n<div class="tw"><table><tr><th>爬虫User-Agent</th><th>来源产品</th><th>推荐robots.txt策略</th><th>为什么重要</th></tr>\n<tr><td><code>GPTBot</code></td><td>ChatGPT Search</td><td>Allow /blog/ /guides/; Disallow /api/ /dashboard/</td><td>ChatGPT Search用户数快速增长，被引用带来直接流量</td></tr>\n<tr><td><code>Google-Extended</code></td><td>AI Overviews / Gemini</td><td><strong>Allow / — 不可屏蔽</strong></td><td>直接影响内容在AI Overviews中的引用</td></tr>\n<tr><td><code>PerplexityBot</code></td><td>Perplexity AI</td><td>Allow /blog/ /guides/</td><td>Perplexity用户群为技术决策者，精准流量</td></tr>\n<tr><td><code>ClaudeBot</code></td><td>Anthropic Claude</td><td>Allow /</td><td>Claude通过RAG引用网页，长篇权威内容被引用概率高</td></tr>\n<tr><td><code>Applebot-Extended</code></td><td>Apple Intelligence</td><td>推荐Allow</td><td>Apple生态用户基数巨大</td></tr>\n<tr><td><code>Bytespider</code></td><td>字节跳动</td><td>按需放行</td><td>国内AI搜索布局</td></tr></table></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-file-alt"></i> 完整robots.txt模板（可直接使用）</div>\n<pre><code># 通用规则\nUser-agent: *\nAllow: /\nDisallow: /admin/\nDisallow: /private/\n\n# AI爬虫精细化管理\nUser-agent: GPTBot\nAllow: /blog/\nAllow: /guides/\nDisallow: /api/\nDisallow: /dashboard/\n\nUser-agent: Google-Extended\nAllow: /\n\nUser-agent: PerplexityBot\nAllow: /blog/\nAllow: /guides/\nDisallow: /api/\n\nUser-agent: ClaudeBot\nAllow: /\n\nUser-agent: Applebot-Extended\nAllow: /\n\nSitemap: https://yourdomain.com/sitemap.xml</code></pre>\n<p style="font-size:13px"><strong>验证方法：</strong>在GSC的robots.txt测试器中逐一测试每个User-Agent，确认重要内容路径返回"允许"。定期检查是否有新AI爬虫出现需要管理。</p></div>'},
    'XML Sitemaps': {t:'XML Sitemaps', h:'<h3>XML Sitemaps最佳实践与常见错误</h3>\n<p>Sitemap是搜索引擎发现网站内容的路线图。正确配置Sitemap能显著提升新内容的发现速度，是技术SEO的基础工作。</p>\n<h4>Sitemap分片策略</h4>\n<p>大型网站应将Sitemap按内容类型拆分为多个子Sitemap，通过Sitemap Index文件统一管理。每个Sitemap文件上限为50MB或50000条URL。</p>\n<div class="cd"><div class="ch" style="color:#097abb">推荐的Sitemap结构</div>\n<pre><code>&lt;sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"&gt;\n  &lt;sitemap&gt;\n    &lt;loc&gt;https://domain.com/sitemap-pages.xml&lt;/loc&gt;\n    &lt;lastmod&gt;2026-05-14&lt;/lastmod&gt;\n  &lt;/sitemap&gt;\n  &lt;sitemap&gt;\n    &lt;loc&gt;https://domain.com/sitemap-blog.xml&lt;/loc&gt;\n  &lt;/sitemap&gt;\n  &lt;sitemap&gt;\n    &lt;loc&gt;https://domain.com/sitemap-faq.xml&lt;/loc&gt;\n  &lt;/sitemap&gt;\n&lt;/sitemapindex&gt;</code></pre></div>\n<h4>Sitemap常见错误清单</h4>\n<div class="tw"><table><tr><th>错误</th><th>影响</th><th>修复方法</th></tr>\n<tr><td>包含noindex页面</td><td>浪费爬虫预算，冲突信号让爬虫困惑</td><td>检查Sitemap中每个URL，移除带noindex标签的页面</td></tr>\n<tr><td>包含301重定向页面</td><td>爬虫多一次跳转，稀释权重</td><td>用最终目标URL替换重定向源URL</td></tr>\n<tr><td>lastmod不更新</td><td>爬虫无法判断内容新鲜度，降低回访频率</td><td>确保lastmod由CMS动态生成，内容变化时自动更新</td></tr>\n<tr><td>超过50MB或50000条</td><td>超出Google处理上限，部分URL不被读取</td><td>拆分为多个子Sitemap，通过Index文件汇总</td></tr>\n<tr><td>robots.txt中未声明</td><td>爬虫可能找不到Sitemap</td><td>在robots.txt底部添加 Sitemap: 指令</td></tr></table></div>\n<div class="cd"><div class="ch" style="color:#097abb">快速验证方法</div>\n<pre><code># 直接访问你的Sitemap确认返回200\ncurl -I https://domain.com/sitemap.xml\n\n# GSC中查看覆盖状态\nGSC → Sitemaps → 应显示成功率>95%</code></pre></div>'},
    'Core Web Vitals': {t:'Core Web Vitals', h:'<h3>Core Web Vitals诊断与修复全流程</h3>\n<p>Google的核心网页指标直接影响搜索排名和AI Overviews的调用优先级。据Google官方数据，满足CWV阈值的网站平均获得更高的用户参与度和转化率。</p>\n<h4>三大指标详解</h4>\n<div class="tw"><table><tr><th>指标</th><th>测量内容</th><th>良好目标</th><th>需改进</th><th>诊断工具</th></tr>\n<tr><td><strong>LCP</strong></td><td>最大内容渲染时间</td><td>&lt;2.5秒</td><td>2.5-4.0秒</td><td>PageSpeed, Lighthouse</td></tr>\n<tr><td><strong>INP</strong></td><td>交互响应时间（2024年起取代FID）</td><td>&lt;200ms</td><td>200-500ms</td><td>Chrome UX报告, Search Console</td></tr>\n<tr><td><strong>CLS</strong></td><td>累积布局偏移</td><td>&lt;0.1</td><td>0.1-0.25</td><td>Lighthouse, Chrome DevTools</td></tr></table></div>\n<h4>LCP优化链路（按优先级）</h4>\n<ol><li><strong>TTFB优化</strong> — 服务器响应时间控制在200ms以内。使用CDN（Cloudflare/Fastly/AWS CloudFront），启用Brotli压缩，实现服务器端缓存</li>\n<li><strong>预加载关键资源</strong> — 对首屏hero图片添加<code>&lt;link rel="preload" as="image" href="hero.webp"&gt;</code>，告诉浏览器优先加载</li>\n<li><strong>移除阻塞渲染的JS</strong> — 关键CSS内联到<code>&lt;head&gt;</code>中，非关键脚本使用defer或async属性</li>\n<li><strong>图片优化</strong> — 使用WebP/AVIF格式（比JPEG节省25-35%），实现响应式srcset，启用懒加载</li></ol>\n<h4>INP优化重点</h4>\n<p>INP是2026年最棘手的CWV指标，因为它涉及整个用户会话过程中所有交互的响应时间。优化核心：减少主线程阻塞。</p>\n<ul><li>使用Chrome DevTools Performance面板识别Long Tasks（>50ms的JS执行）</li>\n<li>将大型任务拆分为小块：使用requestIdleCallback或setTimeout</li>\n<li>优化事件处理器：避免在click/scroll/resize处理器中执行复杂计算</li>\n<li>代码分割：使用动态imports将大型JS包拆分为按需加载的chunks</li></ul>\n<h4>CLS优化要点</h4>\n<ul><li>所有图片/视频/iframe/ad slot必须显式设置width和height属性</li>\n<li>不要在已加载内容上方插入DOM元素</li>\n<li>使用font-display: swap配合size-adjust防止字体加载导致布局偏移</li>\n<li>Google尤其关注移动端CLS，因为视口空间有限，偏移影响更大</li></ul>\n<div class="cd"><div class="ch" style="color:#097abb">快速诊断命令</div>\n<pre><code>npx lighthouse https://domain.com --view --preset=desktop\nnpx lighthouse https://domain.com --view --preset=mobile\n\n# 或用PageSpeed Insights网页版获取全量报告</code></pre></div>'},
    '结构化数据': {t:'结构化数据', h:'<h3>结构化数据实施完整指南</h3>\n<p>结构化数据帮助搜索引擎理解页面内容的含义和关联，直接影响搜索结果展示（Rich Snippets）和AI引擎的RAG检索质量。使用正确Schema的页面在搜索结果中获得显著更高的点击率。</p>\n<h4>优先级推荐类型</h4>\n<div class="tw"><table><tr><th>Schema类型</th><th>适用场景</th><th>AI引擎影响</th><th>实施优先级</th></tr>\n<tr><td><code>FAQPage</code></td><td>问答内容、常见问题页</td><td>⭐⭐⭐⭐⭐ AI引擎直接提取问答对</td><td>最高</td></tr>\n<tr><td><code>HowTo</code></td><td>教程、操作指南</td><td>⭐⭐⭐⭐⭐ 步骤式内容被引用</td><td>最高</td></tr>\n<tr><td><code>SoftwareApplication</code></td><td>AI产品、SaaS工具</td><td>⭐⭐⭐⭐⭐ AI引擎直接读取产品信息</td><td>高</td></tr>\n<tr><td><code>Article</code></td><td>博客、新闻内容</td><td>⭐⭐⭐⭐ Top Stories候选</td><td>高</td></tr>\n<tr><td><code>Product</code></td><td>产品详情页</td><td>⭐⭐⭐⭐ 购物体验增强</td><td>中</td></tr>\n<tr><td><code>BreadcrumbList</code></td><td>面包屑导航</td><td>⭐⭐⭐ 搜索结果展示路径</td><td>中</td></tr></table></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-code"></i> FAQPage完整JSON-LD模板</div>\n<pre><code>&lt;script type="application/ld+json"&gt;\n{\n  "@context": "https://schema.org",\n  "@type": "FAQPage",\n  "mainEntity": [{\n    "@type": "Question",\n    "name": "GEO需要多长时间见效？",\n    "acceptedAnswer": {\n      "@type": "Answer",\n      "text": "FAQ Schema实施后，Citation Rate通常在4周内开始提升，品牌提及份额(BMS)需要8-12周产生显著变化。"\n    }\n  },{\n    "@type": "Question",\n    "name": "GEO和SEO有什么区别？",\n    "acceptedAnswer": {\n      "@type": "Answer",\n      "text": "SEO优化搜索引擎排名，GEO优化AI引擎引用。SEO关注CTR和流量，GEO关注Citation Rate和Brand Mention Share。两者互补，最佳策略是同时优化。"\n    }\n  }]\n}\n&lt;/script&gt;</code></pre>\n<p>验证工具：Google Rich Results Test（https://search.google.com/test/rich-results）粘贴URL或代码片段验证。</p></div>'},
    '网站架构': {t:'网站架构', h:'<h3>网站架构优化实践</h3>\n<p>合理的网站架构帮助搜索引擎爬虫高效爬取，也帮助用户快速找到信息。架构问题是技术SEO中最隐蔽的问题——你感觉网站没问题，但爬虫可能已经开始迷路了。</p>\n<h4>核心原则</h4>\n<div class="tw"><table><tr><th>原则</th><th>说明</th><th>检查方法</th></tr>\n<tr><td>3次点击规则</td><td>任何重要页面距离首页不超过3次点击</td><td>Screaming Frog爬取后查看爬取深度报告</td></tr>\n<tr><td>站内链接策略</td><td>相关文章通过上下文内链连接，传递主题相关性</td><td>导出内部链接报告，检查孤岛页面（orphan pages）</td></tr>\n<tr><td>URL设计规范</td><td>简洁、包含关键词、使用连字符、小写</td><td>检查是否有混合大小写的URL</td></tr>\n<tr><td>面包屑导航</td><td>实现BreadcrumbList Schema增强搜索结果展示</td><td>在搜索结果中验证面包屑显示</td></tr></table></div>\n<h4>常见的架构问题及修复</h4>\n<div class="tw"><table><tr><th>问题</th><th>影响</th><th>修复方案</th></tr>\n<tr><td>孤立页面（orphan pages）</td><td>没有内部链接指向，爬虫发现不了，没有PageRank流动</td><td>从相关内容的文章中增加内链，确保该页面被导航覆盖</td></tr>\n<tr><td>无限制分面导航</td><td>URL参数组合创造无限页面，消耗全部爬虫预算</td><td>对参数页添加noindex标签，在robots.txt中Disallow参数路径，GSC中设置URL参数处理规则</td></tr>\n<tr><td>重定向链过长</td><td>3次以上跳转稀释PageRank，浪费爬虫预算</td><td>将所有内链更新为直接指向最终URL，确保最多1次跳转</td></tr>\n<tr><td>重复URL变体</td><td>www/non-www、HTTP/HTTPS、带斜杠/不带斜杠——4种变体</td><td>统一301重定向到一个规范版本，设置自引用canonical标签</td></tr></table></div>'},
    'SSR/SSG验证': {t:'SSR/SSG验证', h:'<h3>SSR / SSG决策与验证完整指南</h3>\n<p><strong>AI产品最常见的SEO陷阱。</strong>大部分AI工具使用React/Next.js/Nuxt等JS框架开发，如果采用默认的客户端渲染（CSR），搜索引擎爬虫可能只看到一个空的页面壳。据统计，JS渲染类网站的索引延迟平均为3-7天。</p>\n<h4>渲染方案决策树</h4>\n<div class="tw"><table><tr><th>方案</th><th>原理</th><th>SEO友好度</th><th>服务器负载</th><th>推荐场景</th></tr>\n<tr><td><strong>CSR</strong></td><td>浏览器下载JS后在客户端渲染</td><td>❌ 爬虫可能看到空白</td><td>低</td><td>后台、登录后页面、交互工具</td></tr>\n<tr><td><strong>SSR</strong></td><td>每次请求在服务端渲染完整HTML</td><td>✅✅✅ 爬虫立即看到内容</td><td>高（需缓存层）</td><td>内容页、产品页、SEO敏感页</td></tr>\n<tr><td><strong>SSG</strong></td><td>构建时生成静态HTML文件</td><td>✅✅✅ 最优</td><td>最低</td><td>博客、文档、不变内容</td></tr>\n<tr><td><strong>ISR</strong></td><td>SSG+增量静态再生</td><td>✅✅✅ 新鲜度+速度</td><td>中</td><td>内容频繁更新但访问量大的站点</td></tr>\n<tr><td><strong>动态渲染</strong></td><td>对爬虫预渲染HTML，对用户交付CSR</td><td>✅✅ 折中方案</td><td>中</td><td>历史遗留CSR项目的过渡方案（Google已不推荐）</td></tr></table></div>\n<h4>4种SSR验证方法（务必全部执行）</h4>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-terminal"></i> 方法1：curl模拟Googlebot</div>\n<pre><code># 模拟Googlebot访问，检查返回HTML是否有真实内容\ncurl -A "Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)" \\\n  https://yourdomain.com/page | grep -c "&lt;article\\|&lt;main\\|&lt;h1"\n\n# 返回>0 → SSR有内容\n# 返回0 → 可能是空白壳，需要排查\n\n# 查看原始HTML中到底有什么\ncurl -A "Googlebot" https://domain.com/page | head -80</code></pre></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-chrome"></i> 方法2：浏览器禁用JS测试</div>\n<pre><code>Chrome DevTools → 设置（F1）→ 搜索"JavaScript" → 勾选"Disable JavaScript"\n然后刷新页面。\n✅ 页面结构和核心内容可见 → SSR/SSG生效\n❌ 仅显示Loading或空白 → SSR未生效\n\n# 命令行替代：用Lynx纯文本浏览器\n# apt-get install lynx && lynx -dump https://domain.com/page | head -30</code></pre></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-search"></i> 方法3：GSC URL Inspection（最权威）</div>\n<pre><code>1. 打开Google Search Console\n2. 左侧输入要测试的URL\n3. 点击"测试已发布的网址"\n4. 等待测试完成 → 点击"查看测试的页面"\n5. 切换到"HTML"标签\n\n确认以下内容在HTML中可见：\n✅ &lt;title&gt;标签包含关键词\n✅ meta description存在\n✅ h1/h2标签包含预期文字\n✅ 正文内容在HTML中\n✅ JSON-LD结构化数据存在\n❌ 如果HTML只有&lt;div id="root"&gt;&lt;/div&gt; + &lt;script&gt; → 爬虫看不到内容</code></pre></div>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-code-branch"></i> 方法4：Puppeteer对比测试（最精确）</div>\n<pre><code>// Node.js脚本：对比SSR HTML与JS渲染后的字数差异\nconst puppeteer = require("puppeteer");\n(async () => {\n  // 1. 获取服务端渲染的HTML\n  const res = await fetch("https://domain.com/page");\n  const serverHTML = await res.text();\n  const serverText = serverHTML.replace(/<[^>]*>/g, "").trim();\n  const serverWords = serverText.split(/\\s+/).length;\n\n  // 2. 获取JS完全渲染后的HTML\n  const browser = await puppeteer.launch();\n  const page = await browser.newPage();\n  await page.goto("https://domain.com/page", {waitUntil: "networkidle0"});\n  const clientHTML = await page.content();\n  const clientText = clientHTML.replace(/<[^>]*>/g, "").trim();\n  const clientWords = clientText.split(/\\s+/).length;\n  await browser.close();\n\n  // 3. 对比\n  console.log("SSR文本字数: " + serverWords);\n  console.log("JS渲染后字数: " + clientWords);\n  console.log("覆盖率: " + Math.round(serverWords/clientWords*100) + "%");\n  // 覆盖率>80% → SSR生效\n  // 覆盖率<30% → SSR可能只渲染了壳\n})();</code></pre></div>\n<h4>SSR验证6项检查清单</h4>\n<div class="tw"><table><tr><th>#</th><th>检查项</th><th>通过标准</th><th>严重程度</th></tr>\n<tr><td>1</td><td>curl Googlebot返回正文</td><td>grep找到至少1个文章标签</td><td>🔴 阻断</td></tr>\n<tr><td>2</td><td>禁用JS后可阅读</td><td>核心内容可见</td><td>🔴 阻断</td></tr>\n<tr><td>3</td><td>GSC显示完整HTML</td><td>首屏内容已在HTML中</td><td>🟡 关键</td></tr>\n<tr><td>4</td><td>JSON-LD在服务端HTML中存在</td><td>grep到application/ld+json</td><td>🟡 关键</td></tr>\n<tr><td>5</td><td>爬虫抓取时间&lt;1s</td><td>GSC抓取统计报告</td><td>🟠 重要</td></tr>\n<tr><td>6</td><td>Canonical标签一致</td><td>原始HTML和渲染后相同</td><td>🟠 重要</td></tr></table></div>\n<div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 案例：某AI工具的SSR缺失教训</h4><p>某AI写作工具使用Next.js的CSR模式，所有数据通过客户端API加载。上线3个月后GSC显示1500个页面"已发现但未索引"。用curl检查发现Googlebot看到的HTML只有<code>&lt;div id="root"&gt;&lt;/div&gt;</code>+JS脚本。改用SSR（getServerSideProps）后4周内索引率从5%提升到78%，自然流量增长3倍。</p></div>'},
    '周检查清单': {t:'周检查清单', h:'<h3>技术SEO每周检查清单</h3>\n<p>技术SEO不是一次性工作，而是需要持续维护的习惯。以下是一周的检查流程：</p>\n<div class="tw"><table><tr><th>时间</th><th>检查项</th><th>具体操作</th><th>工具</th><th>异常信号</th></tr>\n<tr><td>周一</td><td>GSC抓取统计</td><td>检查抓取量有无异常波动</td><td>GSC→设置→抓取统计</td><td>日抓取量下降>30%</td></tr>\n<tr><td>周二</td><td>Core Web Vitals</td><td>检查LCP/INP/CLS趋势</td><td>GSC→CWV报告</td><td>新增大量"需改进"URL</td></tr>\n<tr><td>周三</td><td>爬虫审计</td><td>查找404/301链/重复title</td><td>Screaming Frog/Sitebulb</td><td>新增404页面超过10个</td></tr>\n<tr><td>周四</td><td>Sitemap覆盖</td><td>检查新页面是否被收录</td><td>GSC→Sitemaps</td><td>新页面3天后仍未收录</td></tr>\n<tr><td>周五</td><td>修复本周issues</td><td>清单上的low-hanging fruit清零</td><td>—</td><td>遗留issues超过5个</td></tr></table></div>'},
  }
};

  tag: 'SEO', tagIcon: 'fa-pen-fancy', color: '#097abb',
  header: '<p>超越关键词匹配，进入语义搜索与实体优化的时代。</p>',
  sections: {
    '语义搜索与意图匹配': {t:'语义搜索与意图匹配', h:'<h3>语义搜索与意图匹配</h3>\n<p>现代搜索引擎使用NLP技术理解查询背后的真实用户意图，结束了纯粹关键词匹配的时代。内容优化需要从关键词密度思维升级到意图满足思维。</p>\n<h4>四种搜索意图及对应内容策略</h4>\n<div class="tw"><table><tr><th>意图类型</th><th>查询示例</th><th>用户目标</th><th>内容策略</th><th>排名信号</th></tr>\n<tr><td>信息型</td><td>"什么是GEO"、"GEO怎么优化"</td><td>获取知识和答案</td><td>定义+深度解释+权威引用+数据支撑</td><td>Featured Snippet, People Also Ask</td></tr>\n<tr><td>导航型</td><td>"ChatGPT登录"、"Google Analytics"</td><td>找到特定网站/页面</td><td>品牌页+清晰入口+Logo</td><td>品牌搜索量, 点击率</td></tr>\n<tr><td>商业调查</td><td>"最佳AI写作工具2025"、"A vs B对比"</td><td>比较选项做决策</td><td>对比评测+功能列表+价格+优缺点</td><td>Buying intent关键词排名, 停留时间</td></tr>\n<tr><td>交易型</td><td>"购买SEO工具"、"AI写作工具折扣"</td><td>完成购买/注册</td><td>产品页+信任信号+CTA+促销</td><td>转化率, 页面价值</td></tr></table></div>\n<p><strong>实操建议：</strong>对每个内容页，先确定其对应的搜索意图类型，然后选择对应的内容策略。同一个关键词可能对应多种意图，需要为不同意图创建不同页面。</p>'},
    '主题集群6步法': {t:'主题集群6步法', h:'<h3>主题集群搭建6步法</h3>\n<p>搜索引擎不再评估单篇页面，而是评估你对于一个主题的整体覆盖深度。零散博客文章无法与结构化内容集群竞争。主题集群（Topic Cluster）是建立主题权威的核心方法。</p>\n<h4>集群架构详解</h4>\n<p>一个完整的内容集群包含1篇Pillar Page（核心支柱页）和5-20篇Cluster Content（集群内容页），通过内链互相连接。Pillar Page覆盖主题全貌（3000-10000词），Cluster Pages深入子话题（1500-3000词）。</p>\n<h4>搭建6步法</h4>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-sitemap"></i> 完整实操流程</div>\n<ol style="margin:0"><li><strong>关键词挖掘</strong> — 用Ahrefs/Semrush导出领域前50个信息型关键词到CSV文件</li>\n<li><strong>主题聚类</strong> — 用Keyword Insights或SEOCluster.ai自动聚类成5-8个核心主题组，使用语义聚类而非关键词匹配</li>\n<li><strong>创建Pillar Page</strong> — 每个主题写3000-10000词的深度文章，全面覆盖该主题并提及所有子话题</li>\n<li><strong>衍生Cluster Content</strong> — 每篇Pillar衍生5-20篇子主题文章（1500-3000词/篇），深入特定子话题</li>\n<li><strong>内链矩阵</strong> — 所有Cluster页面链接回Pillar，Pillar用锚文本链接到所有Cluster，Cluster间相互链接2-3个</li>\n<li><strong>监控迭代</strong> — 在GSC中跟踪集群关键词的展示量增长（3个月目标：翻倍），每季度更新内容</li></ol></div>\n<h4>Pillar Page vs Cluster Page对比</h4>\n<div class="tw"><table><tr><th></th><th>Pillar Page</th><th>Cluster Page</th></tr>\n<tr><td>字数</td><td>3000-10000词</td><td>1500-3000词</td></tr>\n<tr><td>目标关键词</td><td>高搜索量核心词</td><td>长尾特定查询</td></tr>\n<tr><td>内容深度</td><td>全面覆盖，不深入子话题</td><td>深入特定子话题</td></tr>\n<tr><td>内链策略</td><td>链接到所有Cluster</td><td>链接回Pillar+2-3个相关Cluster</td></tr>\n<tr><td>更新频率</td><td>随Cluster扩展更新</td><td>每季度评估更新</td></tr></table></div>\n<div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 案例：Miro的Use Case内容矩阵</h4><p>Miro从一篇白板工具介绍起步，逐步扩展为300+Use Case页面，每个场景一页。每篇使用固定模板：定义→场景→步骤→模板下载→CTA，确保质量一致性和规模化能力。3年内自然流量从200K/月增长到3M/月，<strong>15x增长</strong>。这是主题集群策略的经典案例。</p></div>'},
    'E-E-A-T框架': {t:'E-E-A-T框架', h:'<h3>Google E-E-A-T框架完整实践</h3>\n<p>E-E-A-T是Google搜索质量评估指南的核心框架，对YMYL（Your Money or Your Life）领域网站尤为重要，但也日益影响所有内容的排名。</p>\n<div class="sg"><div class="scd"><div class="sv" style="color:#097abb">E</div><div class="sl">经验</div></div><div class="scd"><div class="sv" style="color:#097abb">E</div><div class="sl">专业</div></div><div class="scd"><div class="sv" style="color:#097abb">A</div><div class="sl">权威</div></div><div class="scd"><div class="sv" style="color:#097abb">T</div><div class="sl">信任</div></div></div>\n<ul><li><strong>经验（Experience）</strong> — 展示第一手实践：产品评测截图、实际使用案例、个人经验分享。搜索引擎偏爱有实际操作经验的内容，而非二手资料汇总。例如AI工具评测应包含实际测试的截图和输出示例。</li>\n<li><strong>专业（Expertise）</strong> — 每个内容页面必须有明确的作者署名，附带可点击的简介链接到LinkedIn/GitHub/个人网站。团队介绍页面展示核心成员的专业背景。行业认证和资质可增强专业信号。</li>\n<li><strong>权威（Authority）</strong> — 内容中引用权威外部来源的原始数据（如研究论文、行业报告、知名媒体）。被行业媒体引用是重要的权威信号。积极参与行业标准和开源项目。</li>\n<li><strong>信任（Trustworthiness）</strong> — 标注信息源的发布日期和上次验证日期。定期更新旧内容（90天内最佳）。透明展示联系方式、公司地址和隐私政策。避免夸大的营销语言。</li></ul>\n<p><strong>实践检查：</strong>你的内容页面是否每篇都有作者署名？外部引用是否链接到可验证的原始来源？信息是否有明确的时间戳？</p>'},
    '实体优化': {t:'实体优化', h:'<h3>实体优化与Knowledge Graph</h3>\n<p>实体优化是帮助搜索引擎理解"你是谁"、"你做什么"以及"你与什么概念相关"的过程。这是从关键词优化到语义优化的关键升级。</p>\n<ul><li><strong>品牌实体一致性</strong> — 在各平台使用完全一致的品牌名称、Logo、描述和社交账号。不一致的品牌信息会削弱搜索引擎对品牌实体的识别。特别检查：官方网站、社交媒体（LinkedIn/Twitter/GitHub）、行业目录、维基百科</li>\n<li><strong>同义词和变体</strong> — 在内容中自然使用品牌/产品的别名、缩写和行业术语变体，帮助搜索引擎理解这些名称指向同一个实体。例如同时使用"AI SEO"和"人工智能搜索引擎优化"</li>\n<li><strong>实体关联</strong> — 内容中建立与行业概念、合作伙伴、上下游工具、竞品的自然关联关系。搜索引擎通过这些关联关系理解你的市场定位</li>\n<li><strong>SameAs Schema实施</strong> — 在Organization Schema中填写sameAs属性，关联所有官方社交账号和平台。Google Knowledge Panel的激活很大程度上依赖于SameAs关联</li></ul>\n<div class="cd"><div class="ch" style="color:#097abb"><i class="fas fa-code"></i> Organization Schema+SameAs模板</div>\n<pre><code>&lt;script type="application/ld+json"&gt;\n{\n  "@context": "https://schema.org",\n  "@type": "Organization",\n  "name": "你的品牌名",\n  "url": "https://domain.com",\n  "logo": "https://domain.com/logo.png",\n  "sameAs": [\n    "https://twitter.com/yourhandle",\n    "https://linkedin.com/company/yourcompany",\n    "https://github.com/yourorg"\n  ]\n}\n&lt;/script&gt;</code></pre></div>'},
    'Featured Snippets': {t:'Featured Snippets', h:'<h3>Featured Snippets优化指南</h3>\n<p>精选摘要（Featured Snippets/Position Zero）位于自然搜索结果上方，是获取零点击搜索流量和AI Overviews引用的关键通道。优化策略因Snippet格式而异。</p>\n<h4>四种Snippet格式及优化方法</h4>\n<div class="tw"><table><tr><th>格式</th><th>触发查询类型</th><th>优化方法</th><th>AI Overviews影响</th></tr>\n<tr><td>段落式</td><td>"什么是XX"、"XX怎么用"</td><td>在H2/H3标题后直接给出40-60字答案，不要铺垫</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>列表式</td><td>"XX的步骤"、"XX的要素"</td><td>使用有序（ol）或无序（ul）列表，每项10-20字</td><td>⭐⭐⭐⭐</td></tr>\n<tr><td>表格式</td><td>"A vs B对比"、"XX价格表"</td><td>用table标签呈现对比数据，首列放对比维度</td><td>⭐⭐⭐⭐</td></tr>\n<tr><td>视频式</td><td>"如何做XX"（教程类）</td><td>视频关键步骤添加时间戳标记</td><td>⭐⭐⭐</td></tr></table></div>\n<p><strong>最佳策略：</strong>优先针对你已经排名在第1-5位的关键词进行Snippet优化。Google已经认为这些页面有排名价值，你离位置0只差一个结构化回答。使用Ahrefs/Semrush的Snippet机会报告识别这些高价值关键词。</p>'},
  }
};

    'AI Overviews现状': {t:'AI Overviews现状', h:'<h3>AI Overviews现状与影响</h3>\n<p>据SparkToro和SEO行业数据，超过65%的Google搜索现在为零点击搜索，用户直接在搜索结果页获得答案而无需点击网站。AI Overviews在信息型查询中的出现率约37%，覆盖率持续扩大。</p>\n<ul><li><strong>高触发率领域</strong> — 健康、科技、金融领域的How-to和定义类查询。围绕"What"、"Why"、"How"类问题触发率最高</li>\n<li><strong>低触发率</strong> — 导航型（品牌搜索）和交易型（购买意图）查询目前较少触发AI Overviews</li>\n<li><strong>发展趋势</strong> — AI Overviews覆盖率持续扩大，更多商业类查询开始触发。优化AI Overviews引用已成为2026年必备的SEO技能</li></ul>'},
    '被引用因素': {t:'被引用因素', h:'<h3>被AI Overviews引用的核心因素</h3>\n<div class="tw"><table><tr><th>因素</th><th>说明</th><th>可操作建议</th><th>影响程度</th></tr>\n<tr><td>直接回答</td><td>页面清晰直接地回答查询，不绕圈子</td><td>H2标题使用完整问题句（"GEO需要多久见效？"），紧跟40-60字直接答案</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>权威域名</td><td>高DR域名的内容更易被引用</td><td>持续建设外链，提升域名权威性。引用权威外部来源</td><td>⭐⭐⭐⭐</td></tr>\n<tr><td>结构化数据</td><td>FAQ/HowTo Schema显著提升提取概率</td><td>所有内容页添加FAQ或HowTo Schema（引用率提升3.2倍）</td><td>⭐⭐⭐⭐⭐</td></tr>\n<tr><td>内容新鲜度</td><td>偏好90天内更新或发布的内容</td><td>建立旧内容定期更新制度，标注最后更新日期</td><td>⭐⭐⭐</td></tr></table></div>'},
    '流量侵蚀应对': {t:'流量侵蚀应对', h:'<h3>流量侵蚀应对策略</h3>\n<p>当AI Overviews侵蚀信息查询流量时，单一依赖搜索流量变得越来越危险。建立品牌护城河是关键：</p>\n<div class="cd"><ul style="margin:0">\n<li><strong>品牌搜索增长</strong> — 通过品牌营销和市场推广提升直接搜索量。品牌词不受AI Overviews影响。</li>\n<li><strong>订阅/邮件列表</strong> — 建立第一方渠道，减少对搜索流量的依赖。邮件订阅用户不经过搜索引擎直接访问内容。</li>\n<li><strong>差异化内容</strong> — 提供AI无法轻易复制的原创数据、独家洞察、第一手实操经验。研究报告、独家数据、深度分析才是不可替代的内容。</li>\n<li><strong>社区建设</strong> — Discord、论坛、用户群、社交媒体社区形成品牌护城河。社区流量不依赖搜索引擎。</li></ul></div>'},
    'SGE测试方法论': {t:'SGE测试方法论', h:'<h3>SGE触发测试方法论</h3>\n<p>每周花10分钟执行这个5步测试流程，保持对AI Overviews变化的敏感度：</p>\n<div class="cd"><table><tr><th>步骤</th><th>操作</th><th>记录内容</th></tr>\n<tr><td>1</td><td>搜索10个核心信息型关键词</td><td>是否触发了AI Overviews（Y/N）</td></tr>\n<tr><td>2</td><td>查看Answer中是否有网页链接引用</td><td>记录引用的来源URL</td></tr>\n<tr><td>3</td><td>你的网站是否被引用</td><td>Y/N + 在Answer中的位置</td></tr>\n<tr><td>4</td><td>site:domain.com + 关键词查询交叉验证</td><td>页面是否已经被索引</td></tr>\n<tr><td>5</td><td>竞品被引用但你没有的，分析差异</td><td>竞品页面做了什么你没做的</td></tr></table></div>'},
    '案例: FAQ Schema': {t:'案例: FAQ Schema', h:'<div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 案例：FAQ Schema对AI Overviews的影响</h4><p>在一项覆盖2000+查询的抽样测试中：实施了FAQPage Schema的页面在AI Overviews中的引用率是未实施页面的<strong>3.2倍</strong>。联合使用FAQPage+HowTo+QAPage产生叠加效应。FAQPage结构使得AI引擎能直接从页面中提取问答对，无需额外语义解析——这是最容易被AI引擎利用的结构化数据类型。</p></div>'},

    'ragopt': {t:'RAG优化', h:'<h3>RAG管道优化</h3><p><strong>检索阶段：</strong>段落150-200词，核心术语在开头。</p><p><strong>排序阶段：</strong>内容含问题原文，答案在切片开头，实体一致。</p>'},
    'langchain': {t:'LangChain测试', h:'<div class="cd"><div class="ch" style="color:#0d9488">LangChain模拟RAG</div><pre><code>from langchain.text_splitter import RecursiveCharacterTextSplitter\ntext_splitter = RecursiveCharacterTextSplitter(chunk_size=500, chunk_overlap=50)\nchunks = text_splitter.split_text(content)\n# FAISS + OpenAI Embedding → 模拟检索</code></pre></div>'}

DATA['geo-metrics'] = {
  tag: 'GEO', tagIcon: 'fa-chart-line', color: '#0d9488',

  sections: {
    'kpi': {t:'核心指标', h:'<h3>核心指标</h3><div class="tw"><table><tr><th>指标</th><th>定义</th></tr><tr><td>Citation Rate</td><td>被引次数/总查询数</td></tr><tr><td>BMS</td><td>品牌/(品牌+竞品)</td></tr><tr><td>AI SoV</td><td>字符占比</td></tr></table></div>'},
    'tracker': {t:'追踪表', h:'<div class="cd"><div class="ch" style="color:#0d9488"><i class="fas fa-calculator"></i> 追踪表</div><table><tr><th>周</th><th>查询</th><th>被引</th><th>Rate</th></tr><tr><td>W1</td><td>20</td><td>3</td><td>15%</td></tr><tr><td>W4</td><td>20</td><td>8</td><td>40%</td></tr></table></div>'},

// Nav tree definition
const TREE = [
  {color:'#097abb', label:'SEO', kids:[
    {slug:'seo-tech', title:'技术优化', ico:'fa-code'},
    {slug:'seo-content', title:'内容优化', ico:'fa-pen-fancy'},
    {slug:'sge', title:'SGE/AI Overviews', ico:'fa-robot'}
  ]},
  {color:'#0d9488', label:'GEO', kids:[
    {slug:'geo-overview', title:'概述', ico:'fa-globe'},
    {slug:'geo-content', title:'内容策略', ico:'fa-file-alt'},
    {slug:'geo-tech', title:'技术实现', ico:'fa-cogs'},
    {slug:'geo-metrics', title:'度量与工具', ico:'fa-chart-line'}
  ]},
  {color:'#d97706', label:'更多增长方法', kids:[
    {slug:'pricing', title:'AI产品定价', ico:'fa-tag', cs:1},
    {slug:'plg', title:'PLG增长', ico:'fa-rocket', cs:1},
    {slug:'community', title:'社区增长', ico:'fa-users', cs:1},
    {slug:'cro', title:'转化率优化', ico:'fa-chart-bar', cs:1},
    {slug:'paid', title:'付费增长', ico:'fa-ad', cs:1},
    {slug:'cases', title:'案例研究库', ico:'fa-flask', cs:1}
  ]}
];

// ===== ROUTING =====
function findNode(slug){
  for(var g=0;g<TREE.length;g++)
    for(var k=0;k<TREE[g].kids.length;k++)
      if(TREE[g].kids[k].slug===slug) return {g,k};
  return null;
}

function getRoute(){
  var h=location.hash.replace('#/','').replace(/\/$/,'');
  if(!h) return {g:-1,k:-1,s2:-1};
  var p=h.split('/');
  var n=findNode(p[0]);
  if(!n) return {g:-1,k:-1,s2:-1};
  var d=DATA[p[0]];
  if(!p[1]||!d||!d.sections) return {g:n.g,k:n.k,s2:-1};
  var slugs=Object.keys(d.sections);
  var idx=slugs.indexOf(p[1]);
  return {g:n.g,k:n.k,s2:idx>=0?idx:-1};
}

function pushRoute(g,k,s2){
  if(g<0||k<0){location.hash='';document.title='AI 产品增长手册';return;}
  var kid=TREE[g].kids[k];
  var secSlug='';
  if(s2>=0&&DATA[kid.slug]&&DATA[kid.slug].sections){
    var slugs=Object.keys(DATA[kid.slug].sections);
    if(s2<slugs.length) secSlug=slugs[s2];
  }
  location.hash='/'+kid.slug+(secSlug?'/'+secSlug:'');
  document.title=kid.title+' · AI 产品增长手册';
}

// ===== BUILD =====
var sb=document.getElementById('sb'),mn=document.getElementById('mn');
var curNav={g:-1,k:-1,s2:-1};

// Build main content
var hd='<div id="hp" style="min-height:70vh;display:flex;flex-direction:column;justify-content:center;max-width:560px"><span class="ch-tg" style="background:rgba(9,122,187,0.08);color:#097abb;border-color:rgba(9,122,187,0.15)"><i class="fas fa-book-open"></i> 综合指南</span><h1 style="font-size:clamp(30px,5vw,48px);">AI产品<br><span style="background:linear-gradient(135deg,#097abb,#0d9488);-webkit-background-clip:text;background-clip:text;color:transparent;">增长手册</span></h1><p style="font-size:15px;color:var(--text-secondary);margin-bottom:18px">从传统搜索优化到生成式引擎优化，从定价策略到社区驱动增长——一本持续更新的AI产品系统性增长指南。</p><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--text-muted)"><span><i class="far fa-file-alt"></i> 16章</span><span><i class="fas fa-sync-alt"></i> 持续更新</span></div></div>';
mn.innerHTML=hd+'<div id="ch-wrap"></div>';

TREE.forEach(function(grp,gi){
  grp.kids.forEach(function(kid,ki){
    var wrap=document.createElement('div');wrap.className='chunk';wrap.id='chk'+gi+'-'+ki;wrap.style.display='none';
    var d=DATA[kid.slug];
    if(d&&!kid.cs){
      var html='<div class="ch-hd">'+tg(d.color,d.tagIcon)+' '+d.tag+'</span><div class="ch-tt">'+kid.title+'</div></div>'+d.header;
      wrap.innerHTML=html+'<div class="sec-wrap" id="sw'+gi+'-'+ki+'"></div>';
      var sw=wrap.querySelector('.sec-wrap');
      var idx=0;
      for(var key in d.sections){
        var sec=document.createElement('div');sec.className='scn';sec.id='sec'+gi+'-'+ki+'-'+idx;
        sec.innerHTML=d.sections[key].h;
        sw.appendChild(sec);
        idx++;
      }
    } else {
      wrap.innerHTML='<div class="csb" style="border-color:'+grp.color+'"><div style="font-size:24px;margin-bottom:8px;opacity:.35"><i class="fas fa-clock" style="color:'+grp.color+'"></i></div><div style="font-size:14px;font-weight:600;color:'+grp.color+'">🚧 正在撰写</div></div>';
    }
    mn.querySelector('#ch-wrap').appendChild(wrap);
  });
});

// Build sidebar
var shtml='<div style="padding:6px 20px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted)"><i class="fas fa-list"></i> 目录</div>';
TREE.forEach(function(grp,gi){
  shtml+='<div class="gr"><span class="dt" style="background:'+grp.color+'"></span> '+grp.label+'</div>';
  grp.kids.forEach(function(kid,ki){
    var hasSec=DATA[kid.slug]&&DATA[kid.slug].sections;
    var ar=hasSec?'<span class="ar" data-gi="'+gi+'" data-ki="'+ki+'"><i class="fas fa-chevron-right"></i></span>':'';
    var csCls=kid.cs?' cs':'';
    shtml+='<div class="l1'+csCls+'" data-g="'+gi+'" data-k="'+ki+'"><div class="l1h">'+ar+'<span class="ic"><i class="fas '+kid.ico+'" style="color:'+grp.color+'"></i></span><span>'+kid.title+'</span></div>';
    if(hasSec){
      shtml+='<div class="sw" data-sw="'+gi+'-'+ki+'">';
      var si=0;
      for(var key in DATA[kid.slug].sections){
        shtml+='<div class="l2" data-g="'+gi+'" data-k="'+ki+'" data-s="'+si+'">'+DATA[kid.slug].sections[key].t+'</div>';
        si++;
      }
      shtml+='</div>';
    }
    shtml+='</div>';
  });
});
sb.innerHTML=shtml;

// ===== NAVIGATION =====
function nav(gi,ki,s2){
  // Hide all chapters and hero
  document.querySelectorAll('#hp,.chunk').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.scn').forEach(function(el){el.classList.remove('act');});
  // Reset sidebar
  document.querySelectorAll('.l1').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.l2').forEach(function(el){el.classList.remove('act');});
  document.querySelectorAll('.sw').forEach(function(el){el.classList.remove('op');});
  document.querySelectorAll('.ar').forEach(function(el){el.classList.remove('op');});

  if(gi<0||ki<0){
    document.getElementById('hp').style.display='flex';
    pushRoute(-1,-1);
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  // Show chapter
  var ch=document.getElementById('chk'+gi+'-'+ki);
  if(!ch){document.getElementById('hp').style.display='flex';pushRoute(-1,-1);return;}
  ch.style.display='block';

  // L1 active
  var l1=document.querySelector('.l1[data-g="'+gi+'"][data-k="'+ki+'"]');
  if(l1) l1.classList.add('active');
  // Open L2
  var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');
  var ar=document.querySelector('[data-gi="'+gi+'"][data-ki="'+ki+'"]');
  if(sw){sw.classList.add('op');if(ar)ar.classList.add('op');}

  // Show section
  if(s2!==undefined&&s2>=0){
    var sec=document.getElementById('sec'+gi+'-'+ki+'-'+s2);
    if(sec){
      sec.classList.add('act');
      var l2=document.querySelector('.l2[data-g="'+gi+'"][data-k="'+ki+'"][data-s="'+s2+'"]');
      if(l2){
        document.querySelectorAll('.l2[data-g="'+gi+'"][data-k="'+ki+'"]').forEach(function(el){el.classList.remove('act');});
        l2.classList.add('act');
      }
    }
  }
  pushRoute(gi,ki,s2);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Initial
var r=getRoute();curNav={g:r.g,k:r.k,s2:r.s2};nav(r.g,r.k,r.s2);

// Click handler
sb.addEventListener('click',function(e){
  var l2=e.target.closest('.l2');
  var l1h=e.target.closest('.l1');
  var ar=e.target.closest('.ar');
  if(ar){
    var gi=parseInt(ar.dataset.gi),ki=parseInt(ar.dataset.ki);
    document.querySelector('[data-sw="'+gi+'-'+ki+'"]').classList.toggle('op');
    ar.classList.toggle('op');
    return;
  }
  if(l2){
    nav(parseInt(l2.dataset.g),parseInt(l2.dataset.k),parseInt(l2.dataset.s));
    return;
  }
  if(l1h&&!l1h.classList.contains('cs')){
    var g=parseInt(l1h.dataset.g),k=parseInt(l1h.dataset.k);
    nav(g,k);
  }
});

window.addEventListener('hashchange',function(){
  var r2=getRoute();
  if(r2.g===curNav.g&&r2.k===curNav.k&&r2.s2===curNav.s2)return;
  curNav={g:r2.g,k:r2.k,s2:r2.s2};
  nav(r2.g,r2.k,r2.s2);
});
})();
</script>
