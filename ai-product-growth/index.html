<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品增长手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root,[data-theme=light]{--bg:#f6f5f1;--bg-sidebar:#faf9f5;--surface:#fff;--surface-hover:#f3f2ed;--border:#e2e0da;--text:#1c1b1a;--text-secondary:#5c5b58;--text-muted:#8f8e8b;--accent:#097abb;--accent2:#0d9488}
[data-theme=dark]{--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]):not([data-theme=dark]){--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--accent:#4bb4e6;--accent2:#34d1c4}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.2;color:var(--text)}
h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin:24px 0 10px;color:var(--text)}
h3{font-size:15px;font-weight:600;margin:18px 0 8px;color:var(--text)}h4{font-size:14px;font-weight:600;margin:14px 0 6px;color:var(--text)}
p{font-size:14px;color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text);font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface);padding:2px 6px;border-radius:4px;color:var(--accent)}
pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-home{color:var(--accent);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
.theme-toggle{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:6px 10px;font-size:13px;cursor:pointer}
.theme-toggle:hover{border-color:var(--border-raised);color:var(--text)}
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sidebar{width:260px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:10px 0}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.gr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 20px 4px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.gr .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.tr{cursor:pointer;user-select:none}
.l2{display:flex;align-items:center;gap:5px;padding:5px 16px 5px 28px;font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .12s}
.l2:hover{background:var(--surface-hover);color:var(--text)}
.l2.active{color:var(--text);font-weight:600;background:var(--surface);border-left-color:var(--accent)}
.l2.cs{opacity:.45}
.l2 .ar{font-size:8px;width:12px;text-align:center;color:var(--text-dim);transition:transform .2s}
.l2 .ar.open{transform:rotate(90deg)}
.l2 .ico{font-size:11px;width:14px;text-align:center;flex-shrink:0}
.l3{display:flex;align-items:center;padding:3px 16px 3px 50px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.l3:hover{color:var(--text-secondary)}
.l3.active{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sw{display:none}.sw.open{display:block}
.main{flex:1;padding:28px 44px 80px;max-width:920px;background:var(--surface);min-height:calc(100vh - 52px)}
.sec{display:none}.sec.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec.active{animation:fade .22s ease}
.ch-header{margin-bottom:20px}
.ch-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ch-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.15;color:var(--text)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.card-h{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.sv{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sl{font-size:10px;color:var(--text-muted);margin-top:4px}
.tw{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface-hover)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin:10px 0}
.tc{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.tn{font-weight:600;font-size:12px}.td{font-size:11px;color:var(--text-muted)}
ul,ol{margin:8px 0 14px;padding-left:20px;color:var(--text-secondary);font-size:14px;line-height:1.8}
li{margin-bottom:4px}
.hl{border-radius:8px;padding:16px 18px;margin:14px 0;border:1px solid}.hl p:last-child{margin-bottom:0}
.dv{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:28px 0}
.cs-b{border:1px dashed var(--border);border-radius:8px;padding:24px 20px;text-align:center;margin:12px 0;background:var(--bg)}
@media(max-width:900px){.sidebar{display:none}.main{padding:24px 18px 60px}}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr)}.ch-title{font-size:20px}h1{font-size:22px}}
</style>
</head>
<body>
<div class="topbar">
  <a class="topbar-home" href="../../"><i class="fas fa-arrow-left"></i><span> 报告索引</span></a>
  <span class="topbar-title">AI 产品增长手册</span>
  <button class="theme-toggle" id="tt"><i class="fas fa-moon"></i></button>
</div>
<div class="layout"><div class="sidebar" id="sidebar"></div><div class="main" id="main"></div></div>
<script>
(function(){
// Theme
(function(){const s=localStorage.getItem('t');if(s)document.documentElement.setAttribute('data-theme',s);const b=document.getElementById('tt');b.addEventListener('click',()=>{const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':c==='light'?'system':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('t',n);const i=b.querySelector('i');i.className=n==='dark'?'fas fa-sun':n==='light'?'fas fa-sun-bright':'fas fa-desktop'});})();

// ===== DATA =====
function tg(c){return'<span class="ch-tag" style="background:'+(c==='#097abb'?'rgba(9,122,187,0.08);color:#097abb;border-color:rgba(9,122,187,0.15)':c==='#0d9488'?'rgba(13,148,136,0.08);color:#0d9488;border-color:rgba(13,148,136,0.15)':'color-mix(in srgb,'+c+'10%,transparent);color:'+c+';border-color:color-mix(in srgb,'+c+'18%,transparent)')+'">'}
function hdr(slug,c,tag){
  return'<div class="ch-header">'+tg(c)+'<i class="fas '+(slug==='seo-tech'?'fa-code':slug==='seo-content'?'fa-pen-fancy':slug==='sge'?'fa-robot':slug==='geo-overview'?'fa-globe':slug==='geo-content'?'fa-file-alt':slug==='geo-tech'?'fa-cogs':'fa-chart-line')+'"></i> '+tag+'</span><div class="ch-title">'+({seo:'技术优化',scon:'内容优化',sge:'SGE / AI Overviews',gov:'概述',gcon:'内容策略',gtech:'技术实现',gmet:'度量与工具'}[slug]||'')+'</div></div>';
}

// Each chapter: {header, sections:{slug:html}}
const C = {
'seo-tech':{
  h:hdr('seo-tech','#097abb','SEO')+'<div class="sg"><div class="sc"><div class="sv" style="color:#097abb">2.5s</div><div class="sl">LCP</div></div><div class="sc"><div class="sv" style="color:#097abb">200ms</div><div class="sl">INP</div></div><div class="sc"><div class="sv" style="color:#097abb">0.1</div><div class="sl">CLS</div></div></div>',
  s:{
crawl:'<h3>抓取与索引</h3><p>Google 通过爬虫遍历链接读取内容后存入索引库。如果爬虫无法访问页面，内容就不会出现在搜索结果中。</p><ul><li>所有重要页面在 GSC 中显示"已索引"</li><li>robots.txt 没有误封关键路径</li><li>页面返回 200（非 302/404/500）</li><li>CSS/JS 没有被屏蔽</li></ul>',
crawlers:'<h3>AI 爬虫管理</h3><p>精准控制各类 AI 爬虫的访问。允许有信息价值的内容页，限制工具/API/后台。</p><div class="tw"><table><tr><th>爬虫</th><th>来源</th><th>策略</th></tr><tr><td><code>GPTBot</code></td><td>OpenAI</td><td>允许内容页，限制 API</td></tr><tr><td><code>Google-Extended</code></td><td>Google Gemini</td><td><strong>必须允许</strong></td></tr><tr><td><code>PerplexityBot</code></td><td>Perplexity</td><td>允许抓取</td></tr><tr><td><code>ClaudeBot</code></td><td>Anthropic</td><td>允许主路径</td></tr></table></div><div class="card"><div class="card-h" style="color:#097abb"><i class="fas fa-file-alt"></i> robots.txt 模板</div><pre><code>User-agent: GPTBot\nAllow: /blog/ /guides/\nDisallow: /api/ /dashboard/\nUser-agent: Google-Extended\nAllow: /\nUser-agent: *\nDisallow: /admin/\nSitemap: https://domain.com/sitemap.xml</code></pre></div>',
sitemaps:'<h3>XML Sitemaps</h3><p>Sitemap 是搜索引擎发现内容的路线图。适用于 AI 爬虫和传统爬虫。</p><ul><li><strong>分片管理</strong> — 按内容类型拆分为多个 Sitemap（文章、工具页、FAQ 等），通过 Sitemap Index 汇总</li><li><strong>优先标注</strong> — 使用 <code>&lt;lastmod&gt;</code> 告诉爬虫新鲜度</li><li><strong>提交到 GSC</strong> — 同时在 robots.txt 中通过 <code>Sitemap: https://domain.com/sitemap.xml</code> 声明</li></ul>',
cvitals:'<h3>Core Web Vitals</h3><p>Google 的核心网页指标——影响排名和 AI Overviews 调用优先级。</p><div class="card"><div class="card-h" style="color:#097abb"><i class="fas fa-check-circle"></i> 周检查清单</div><table><tr><th>周一</th><th>周二</th><th>周三</th><th>周四</th></tr><tr><td>GSC 抓取统计</td><td>Lighthouse CI</td><td>爬虫审计</td><td>数据趋势对比</td></tr></table></div>',
schema:'<h3>结构化数据 (Schema.org)</h3><p>帮助搜索引擎理解内容语境，直接影响 Rich Snippets 和 AI 引擎的 RAG 检索质量。</p><div class="tw"><table><tr><th>类型</th><th>用途</th><th>重要度</th></tr><tr><td><code>FAQPage</code></td><td>问答对提取</td><td>⭐⭐⭐⭐⭐</td></tr><tr><td><code>HowTo</code></td><td>教程步骤</td><td>⭐⭐⭐⭐⭐</td></tr><tr><td><code>SoftwareApplication</code></td><td>AI 产品页</td><td>⭐⭐⭐⭐⭐</td></tr></table></div>',
arch:'<h3>网站架构</h3><ul><li><strong>扁平层级</strong> — 重要页面距离首页不超过 3 次点击</li><li><strong>站内链接</strong> — 相关文章通过上下文内链连接</li><li><strong>URL 结构</strong> — 简洁、连字符、小写：<code>/guides/seo-ai</code></li><li><strong>面包屑</strong> — BreadcrumbList Schema 增强理解</li></ul>',
ssr:'<h3>SSR / SSG 决策与验证</h3><p><strong>AI产品最常见的SEO陷阱。</strong>大部分AI工具使用React/Next.js，默认CSR可能让爬虫看到空白页。</p><div class="tw"><table><tr><th>方案</th><th>SEO</th><th>适用</th></tr><tr><td>CSR</td><td>❌</td><td>工具页</td></tr><tr><td>SSR</td><td>✅✅✅</td><td>内容页</td></tr><tr><td>SSG</td><td>✅✅✅</td><td>博客</td></tr></table></div><div class="card"><div class="card-h" style="color:#097abb">curl 模拟 Googlebot</div><pre><code>curl -A "Mozilla/5.0 (compatible; Googlebot/2.1)" \\\n  https://domain.com/page | grep "&lt;article\\|&lt;main"</code></pre></div><div class="card"><div class="card-h" style="color:#097abb">GSC URL Inspection</div><pre><code>Search Console → URL Inspection\n→ 测试已发布的网址 → 查看"Google看到的HTML"\n✅ 有真实内容而非空的JS入口</pre></div><div class="card"><div class="card-h" style="color:#097abb">SSR 验证清单</div><table><tr><th>#</th><th>检查项</th></tr><tr><td>1</td><td>curl Googlebot 返回正文 HTML</td></tr><tr><td>2</td><td>禁用 JS 后可阅读</td></tr><tr><td>3</td><td>GSC 显示完整 HTML</td></tr><tr><td>4</td><td>JSON-LD 在服务端 HTML 中存在</td></tr></table></div>',
cl:'<h3>技术 SEO 周检查清单</h3><div class="tw"><table><tr><th>时间</th><th>任务</th><th>工具</th></tr><tr><td>周一</td><td>GSC 抓取统计</td><td>Search Console</td></tr><tr><td>周二</td><td>Lighthouse CI</td><td>PageSpeed</td></tr><tr><td>周三</td><td>爬虫审计</td><td>Screaming Frog</td></tr><tr><td>周四</td><td>数据趋势对比</td><td>Looker Studio</td></tr></table></div>'
  }
},
'seo-content':{
  h:hdr('scon','#097abb','SEO')+'<p>超越关键词匹配，进入语义搜索与实体优化的时代。</p>',
  s:{
  sem:'<h3>语义搜索与意图匹配</h3><div class="tw"><table><tr><th>意图</th><th>策略</th></tr><tr><td>信息型</td><td>定义+解释+引用</td></tr><tr><td>导航型</td><td>品牌页</td></tr><tr><td>商业调查</td><td>对比+功能</td></tr><tr><td>交易型</td><td>产品页</td></tr></table></div>',
  clusters:'<h3>主题集群 6 步法</h3><div class="card"><ol style="margin:0"><li>关键词挖掘 — Ahrefs Top50</li><li>主题聚类 — NLP 工具聚类 5-8 个主题</li><li>Pillar Page — 2000+ 词深度内容</li><li>Cluster — 每篇衍生 5-10 篇</li><li>内链矩阵 — 双向链接</li><li>监控 — GSC 覆盖度趋势</li></ol></div>',
  eeat:'<h3>E-E-A-T 框架</h3><p>经验·专业·权威·信任。每个内容页须有作者署名，附简介链接到 LinkedIn/GitHub。</p><ul><li><strong>经验</strong> — 展示第一手实践案例</li><li><strong>专业</strong> — 作者资质展示</li><li><strong>权威</strong> — 外部引用权威来源</li><li><strong>信任</strong> — 信息源可验证</li></ul>',
  entity:'<h3>实体优化</h3><p>帮助搜索引擎理解你是谁、做什么、和相关概念的关联。</p><ul><li>一致品牌名、Logo、描述</li><li>同义词和缩写自然使用</li><li>SameAs Schema 关联社交媒体</li></ul>',
  snippets:'<h3>Featured Snippets 优化</h3><div class="tw"><table><tr><th>类型</th><th>方法</th></tr><tr><td>段落式</td><td>40-60 字直接回答在 H2 后</td></tr><tr><td>列表式</td><td>步骤用 ol/ul</td></tr><tr><td>表格式</td><td>对比用 table</td></tr></table></div>',
  miro:'<div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 案例：Miro Use Case 矩阵</h4><p>从一篇白板介绍 → 300+ Use Case 页面。每篇：定义→场景→步骤→模板→CTA。3 年流量 <strong>15x</strong> 增长。</p></div>'
  }
},
'sge':{
  h:hdr('sge','#097abb','SEO')+'<div class="sg"><div class="sc"><div class="sv" style="color:#d97706">65%+</div><div class="sl">零点击搜索</div></div><div class="sc"><div class="sv" style="color:#d97706">37%</div><div class="sl">AO 出现率</div></div></div>',
  s:{
  overview:'<h3>AI Overviews 现状</h3><p>健康、科技、金融领域的 How-to 和定义类查询高触发率，商业类查询覆盖率持续扩大。</p>',
  factors:'<h3>被引用核心因素</h3><ul><li><strong>直接回答</strong> — H2/H3 后直接答</li><li><strong>权威域名</strong> — 高 DR 域名更易被引用</li><li><strong>FAQ Schema</strong> — 引用率 3.2 倍提升</li><li><strong>新鲜度</strong> — 90 天内更新</li></ul>',
  erosion:'<h3>流量侵蚀应对</h3><div class="card"><ul style="margin:0"><li><strong>品牌搜索增长</strong> — 提升直接搜索量</li><li><strong>订阅/邮件列表</strong> — 第一方渠道</li><li><strong>差异化内容</strong> — AI 无法复制的原创数据</li></ul></div>',
  testing:'<h3>SGE 触发测试方法论</h3><div class="card"><table><tr><th>#</th><th>操作</th></tr><tr><td>1</td><td>搜索核心信息型查询</td></tr><tr><td>2</td><td>检查是否触发 AI Overviews</td></tr><tr><td>3</td><td>你的内容是否被引用</td></tr><tr><td>4</td><td>site:domain+vquery 交叉验证</td></tr></table></div>',
  faq:'<div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 案例：FAQ Schema 影响</h4><p>2000+ 查询抽样测试：FAQ Schema 实施页面在 AI Overviews 中引用率是未实施的 <strong>3.2 倍</strong>。</p></div>'
  }
},
'geo-overview':{
  h:hdr('gov','#0d9488','GEO')+'<div class="sg"><div class="sc"><div class="sv" style="color:#0d9488">156%</div><div class="sl">引用提升</div></div><div class="sc"><div class="sv" style="color:#0d9488">35x</div><div class="sl">AI 流量</div></div></div>',

// ===== ROUTING =====
function getRoute(){
  var h=location.hash.replace('#/','').replace(/\/$/,'');
  if(!h)return{g:-1,k:-1,s2:-1};
  var p=h.split('/');
  for(var gi=0;gi<G.length;gi++)for(var ki=0;ki<G[gi].kids.length;ki++){
    if(G[gi].kids[ki].slug===p[0]){
      if(!p[1])return{g:gi,k:ki,s2:-1};
      var S=G[gi].kids[ki].S;
      if(!S||S.length===0)return{g:gi,k:ki,s2:-1};
      if(typeof S[0]==='object'){
        for(var si=0;si<S.length;si++)if(S[si].sl===p[1])return{g:gi,k:ki,s2:si};
      }else{
        // Sections are string keys in C object
        var s2=-1;
        if(C[p[0]]&&C[p[0]].s)for(var key in C[p[0]].s)if(key===p[1])s2=0;
        return{g:gi,k:ki,s2:s2};
      }
      return{g:gi,k:ki,s2:-1};
    }
  }
  return{g:-1,k:-1,s2:-1};
}

function pushRoute(g,k,s2){
  if(g<0||k<0){location.hash='';document.title='AI 产品增长手册';return;}
  var kid=G[g].kids[k];
  var secSlug='';
  if(s2>=0&&kid.S&&kid.S.length>0){
    if(typeof kid.S[0]==='object')secSlug=kid.S[s2].sl;
    else if(C[kid.slug]&&C[kid.slug].s){
      var idx=0;for(var key in C[kid.slug].s){if(idx===s2){secSlug=key;break;}idx++;}
    }
  }
  location.hash='/'+kid.slug+(secSlug?'/'+secSlug:'');
  document.title=kid.title+' · AI 产品增长手册';
}

// ===== NAVIGATION =====
var curNav={g:-1,k:-1,s2:-1};

function nav(gi,ki,s2){
  // Hide all
  document.querySelectorAll('#hero,#ch\\d+-\\d+').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.sec').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.l2').forEach(function(el){el.classList.remove('active');if(parseInt(el.dataset.g)===gi&&parseInt(el.dataset.k)===ki)el.classList.add('active');});
  document.querySelectorAll('.sw').forEach(function(w){w.classList.remove('open');w.querySelectorAll('.l3').forEach(function(x){x.classList.remove('active');});});
  document.querySelectorAll('.ar').forEach(function(a){a.classList.remove('open');});

  if(gi<0||ki<0){
    document.getElementById('hero').style.display='block';
    pushRoute(gi,ki,s2);
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  // Show chapter
  var ch=document.getElementById('ch'+gi+'-'+ki);
  if(!ch){document.getElementById('hero').style.display='block';pushRoute(-1,-1);return;}
  ch.style.display='block';

  // Subs
  var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');var ar=document.querySelector('[data-gi="'+gi+'"][data-ki="'+ki+'"]');
  if(sw){sw.classList.add('open');if(ar)ar.classList.add('open');}

  // Show section
  if(s2!==undefined&&s2>=0){
    var sec=document.getElementById('sec'+gi+'-'+ki+'-'+s2);
    if(sec){
      sec.classList.add('active');
      var el=document.querySelector('.l3[data-g="'+gi+'"][data-k="'+ki+'"][data-s="'+s2+'"]');
      if(el){document.querySelectorAll('.l3[data-g="'+gi+'"][data-k="'+ki+'"]').forEach(function(x){x.classList.remove('active');});el.classList.add('active');}
    }
  }

  pushRoute(gi,ki,s2);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Initial load
var r=getRoute();curNav={g:r.g,k:r.k,s2:r.s2};nav(r.g,r.k,r.s2);

// Click delegation
sb.addEventListener('click',function(e){
  var l2=e.target.closest('.l2');var l3=e.target.closest('.l3');var ar=e.target.closest('.ar');
  if(ar){var gi=parseInt(ar.dataset.gi),ki=parseInt(ar.dataset.ki);var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');if(sw){sw.classList.toggle('open');ar.classList.toggle('open');}return;}
  if(l3){nav(parseInt(l3.dataset.g),parseInt(l3.dataset.k),parseInt(l3.dataset.s));return;}
  if(l2&&!l2.classList.contains('cs'))nav(parseInt(l2.dataset.g),parseInt(l2.dataset.k));
});

window.addEventListener('hashchange',function(){
  var r2=getRoute();
  if(r2.g===curNav.g&&r2.k===curNav.k&&r2.s2===curNav.s2)return;
  curNav={g:r2.g,k:r2.k,s2:r2.s2};
  nav(r2.g,r2.k,r2.s2);
});
})();
