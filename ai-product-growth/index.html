<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品增长手册</title>
<meta name="description" content="AI 产品的系统性增长指南。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface-raised: #18181a;
  --surface-hover: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --border-raised: rgba(255,255,255,0.1);
  --text: #e8e8ee;
  --text-secondary: #8a8a9a;
  --text-muted: #5a5a6a;
  --seo: #0ea5e9;
  --geo: #14b8a6;
  --growth: #f97316;
  --pricing: #f59e0b;
  --plg: #10b981;
  --community: #ec4899;
  --cro: #06b6d4;
  --paid: #ef4444;
  --sidebar-w: 220px;
  --topbar-h: 48px;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.024'/%3E%3C/svg%3E") repeat;
  pointer-events: none; z-index: 9999;
}
h1 { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; margin-bottom:16px; }
h2 { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; margin:32px 0 12px; }
h3 { font-size:16px; font-weight:600; margin:24px 0 10px; }
p { font-size:14px; color:var(--text-secondary); margin-bottom:14px; line-height:1.8; }
strong { color:var(--text); font-weight:600; }
code { font-family:'JetBrains Mono',monospace; font-size:13px; background:rgba(255,255,255,0.06); padding:2px 7px; border-radius:4px; color:var(--seo); }
pre { background:rgba(0,0,0,0.4); border:1px solid var(--border-raised); border-radius:var(--radius); padding:16px; overflow-x:auto; margin:14px 0; font-size:13px; line-height:1.6; }
pre code { background:none; padding:0; color:var(--text-secondary); }

/* ===== Top Bar ===== */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:1000;
  height: var(--topbar-h);
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
}
.topbar::-webkit-scrollbar { display:none; }
.ch-tab {
  font-size:11px; font-weight:500;
  color:var(--text-muted); text-decoration:none;
  padding:4px 10px; border-radius:4px;
  white-space:nowrap; cursor:pointer;
  transition: all 0.2s;
}
.ch-tab:hover { color:var(--text); background:var(--surface-hover); }
.ch-tab.active { color:#fff; background:rgba(255,255,255,0.07); }
.ch-tab.cs { opacity:0.4; }
.tab-sep { color:var(--text-muted); font-size:10px; opacity:0.25; margin:0 3px; }

/* ===== Layout ===== */
.layout { display:flex; margin-top:var(--topbar-h); min-height:calc(100vh - var(--topbar-h)); }

/* ===== Sidebar (Level 2) ===== */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky; top:var(--topbar-h); height:calc(100vh - var(--topbar-h));
  overflow-y:auto;
}
.sidebar-label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; color:var(--text-muted);
  padding:0 16px 12px;
}
.s2-item {
  display:block;
  font-size:13px; font-weight:400;
  color:var(--text-secondary); text-decoration:none;
  padding:6px 16px 6px 20px;
  border-left:2px solid transparent;
  cursor:pointer;
  transition: all 0.15s;
}
.s2-item:hover { color:var(--text); border-left-color:var(--text-muted); }
.s2-item.active { color:var(--text); border-left-color:var(--seo); }

/* ===== Main Content ===== */
.main {
  flex:1; padding:32px 40px 80px;
  max-width:820px;
}

/* ===== Chapter Header ===== */
.ch-header { margin-bottom:28px; }
.ch-tag { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; padding:3px 10px; border-radius:12px; display:inline-flex; align-items:center; gap:6px; margin-bottom:12px; }
.ch-title { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; }

/* ===== Cards ===== */
.card { background:var(--surface); border:1px solid var(--border-raised); border-radius:var(--radius); padding:20px; margin-bottom:18px; }
.card-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; margin-bottom:10px; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin:20px 0; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-val { font-size:24px; font-weight:800; line-height:1; letter-spacing:-1px; }
.stat-lbl { font-size:11px; color:var(--text-muted); margin-top:5px; }
.table-wrap { overflow-x:auto; margin:14px 0; border-radius:var(--radius); border:1px solid var(--border-raised); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:rgba(255,255,255,0.03); padding:8px 12px; text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); border-bottom:1px solid var(--border-raised); }
tbody td { padding:8px 12px; border-bottom:1px solid var(--border); color:var(--text-secondary); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,0.02); }
.tool-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:8px; margin:14px 0; }
.tool-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:12px 14px; transition:all .2s; }
.tool-card:hover { transform:translateY(-2px); border-color:var(--border-raised); }
.tc-name { font-weight:600; font-size:13px; margin-bottom:2px; }
.tc-desc { font-size:11px; color:var(--text-muted); }
ul,ol { margin:10px 0 18px; padding-left:20px; color:var(--text-secondary); font-size:14px; line-height:1.8; }
li { margin-bottom:5px; }
.hl { border-radius:var(--radius); padding:18px 22px; margin:18px 0; border:1px solid; }
.hl p:last-child { margin-bottom:0; }
.tag { font-size:11px; padding:2px 9px; border-radius:10px; font-weight:500; }
.divider { height:1px; background:linear-gradient(90deg,transparent,var(--border-raised),transparent); margin:36px 0; }

/* ===== Coming Soon ===== */
.cs-block { background:var(--surface); border:1px dashed var(--border-raised); border-radius:var(--radius); padding:32px 24px; text-align:center; margin:14px 0; }
.cs-icon { font-size:28px; margin-bottom:10px; opacity:.5; }
.cs-title { font-size:15px; font-weight:600; margin-bottom:6px; }
.cs-desc { font-size:13px; color:var(--text-muted); margin-bottom:14px; }
.cs-toc { list-style:none; padding:0; margin:12px auto 0; max-width:400px; text-align:left; }
.cs-toc li { font-size:13px; color:var(--text-muted); padding:4px 0; display:flex; align-items:center; gap:8px; }
.dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }

/* ===== Responsive ===== */
@media (max-width:900px) { .sidebar { display:none; } .main { padding:24px 20px 60px; } }
@media (max-width:600px) {
  .stat-grid { grid-template-columns:repeat(2,1fr); }
  .tool-grid { grid-template-columns:repeat(2,1fr); }
  .ch-title { font-size:22px; }
  h1 { font-size:24px; }
}

/* ===== Animations ===== */
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.ch-page { display:none; animation:fadeIn 0.3s ease; }
.ch-page.active { display:block; }
</style>
</head>
<body>

<!-- Top Bar: Level 1 Navigation (Chapters) -->
<div class="topbar" id="topbar">
  <a data-ch="0" class="ch-tab active" style="font-weight:600;color:var(--text)">📖</a>
  <span class="tab-sep">·</span>
  <a data-ch="1" class="ch-tab" style="color:var(--seo)">01 SEO:技术</a>
  <a data-ch="2" class="ch-tab" style="color:var(--seo)">02 SEO:内容</a>
  <a data-ch="3" class="ch-tab" style="color:var(--seo)">03 SGE</a>
  <span class="tab-sep">·</span>
  <a data-ch="4" class="ch-tab" style="color:var(--geo)">04 GEO:概述</a>
  <a data-ch="5" class="ch-tab" style="color:var(--geo)">05 GEO:内容</a>
  <a data-ch="6" class="ch-tab" style="color:var(--geo)">06 GEO:技术</a>
  <a data-ch="7" class="ch-tab" style="color:var(--geo)">07 GEO:度量</a>
  <span class="tab-sep">·</span>
  <a data-ch="8" class="ch-tab cs" style="color:var(--pricing)">08 定价</a>
  <a data-ch="9" class="ch-tab cs" style="color:var(--plg)">09 PLG</a>
  <a data-ch="10" class="ch-tab cs" style="color:var(--community)">10 社区</a>
  <a data-ch="11" class="ch-tab cs" style="color:var(--growth)">11 内容矩阵</a>
  <a data-ch="12" class="ch-tab cs" style="color:var(--cro)">12 CRO</a>
  <a data-ch="13" class="ch-tab cs" style="color:var(--paid)">13 付费</a>
  <a data-ch="14" class="ch-tab cs" style="color:#6366f1">14 i18n</a>
  <a data-ch="15" class="ch-tab cs" style="color:var(--plg)">15 数据</a>
  <a data-ch="16" class="ch-tab cs" style="color:var(--community)">16 案例库</a>
</div>

<div class="layout">
  <!-- Sidebar: Level 2 Navigation (Sections within current chapter) -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label" id="s2-label">章节内容</div>
    <nav id="s2-nav"></nav>
  </div>

  <!-- Main Content Area -->
  <div class="main" id="main">

    <!-- ========== PAGE 0: HERO ========== -->
    <div class="ch-page active" id="ch0">
      <div style="min-height:70vh;display:flex;flex-direction:column;justify-content:center;">
        <span class="ch-tag" style="background:rgba(14,165,233,0.1);color:var(--seo);border:1px solid rgba(14,165,233,0.2);"><i class="fas fa-book-open"></i> 综合指南</span>
        <h1 style="font-size:clamp(36px,5vw,56px);">AI 产品<br><span style="background:linear-gradient(135deg,var(--seo),var(--geo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">增长手册</span></h1>
        <p style="font-size:17px;color:var(--text-secondary);max-width:500px;margin-bottom:24px;">从传统搜索优化到生成式引擎优化，从定价策略到社区驱动增长——一本持续更新的 AI 产品系统性增长指南。</p>
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text-muted);"><span><i class="far fa-file-alt"></i> 16 章</span><span><i class="fas fa-sync-alt"></i> 持续更新</span><span><i class="fas fa-tag"></i> v1.0</span></div>
      </div>
    </div>

    <!-- ========== CHAPTER DATA ========== -->
    <!-- All chapter content stored as hidden JSON-like divs -->
    <!-- In production, this would be fetched from markdown/json -->

  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== Chapter Data =====
  // Each chapter has: id, title, color, status(0=live,1=cs), sections[], content
  const chData = [
    { id:'ch0', title:'封面', color:'#fff', status:0,
      sections:[], content:'' },
    { id:'ch1', title:'SEO: 技术层', color:'var(--seo)', status:0,
      sections:['抓取与索引','AI爬虫管理','XML Sitemaps','Core Web Vitals','结构化数据','网站架构','SSR/SSG策略'] },
    { id:'ch2', title:'SEO: 内容层', color:'var(--seo)', status:0,
      sections:['语义搜索','主题集群','E-E-A-T框架','实体优化','Featured Snippets','案例: Miro'] },
    { id:'ch3', title:'SGE / AI Overviews', color:'var(--seo)', status:0,
      sections:['AI Overviews现状','被引用因素','流量侵蚀应对','SGE测试方法论','案例: FAQ Schema'] },
    { id:'ch4', title:'GEO: 概述', color:'var(--geo)', status:0,
      sections:['GEO定义','SEO vs GEO','AI引擎生态','RAG管道拆解','引用率基线测试'] },
    { id:'ch5', title:'GEO: 内容策略', color:'var(--geo)', status:0,
      sections:['Answer-First写作','Claim-Based写作','事实密度','E-E-A-T实践','改写案例对比'] },
    { id:'ch6', title:'GEO: 技术实现', color:'var(--geo)', status:0,
      sections:['语义HTML','结构化数据模板','RAG优化策略','LangChain测试','引用优化'] },
    { id:'ch7', title:'GEO: 度量与工具', color:'var(--geo)', status:0,
      sections:['核心指标','手动度量','工具对比','计算表模板'] },
    { id:'ch8', title:'AI 产品定价策略', color:'var(--pricing)', status:1,
      sections:['定价模型对比','免费增值转化','按量vs订阅','定价页A/B测试','案例拆解'] },
    { id:'ch9', title:'PLG 增长', color:'var(--plg)', status:1,
      sections:['PLG漏斗设计','激活率优化','病毒系数','Self-serve vs Sales'] },
    { id:'ch10', title:'社区驱动增长', color:'var(--community)', status:1,
      sections:['冷启动策略','UGC激励机制','用户传播','社区→产品转化'] },
    { id:'ch11', title:'内容营销矩阵', color:'var(--growth)', status:1,
      sections:['技术博客','YouTube教程','Newsletter','多平台分发'] },
    { id:'ch12', title:'转化率优化', color:'var(--cro)', status:1,
      sections:['注册流程','Onboarding','Pricing Page CRO','A/B测试框架'] },
    { id:'ch13', title:'付费增长', color:'var(--paid)', status:1,
      sections:['付费搜索','社交媒体广告','联盟营销','ROI归因'] },
    { id:'ch14', title:'国际化增长', color:'#6366f1', status:1,
      sections:['多语言SEO','本地化策略','跨市场优先级'] },
    { id:'ch15', title:'数据驱动增长', color:'var(--plg)', status:1,
      sections:['增长仪表板','North Star Metric','实验框架','Cohort分析'] },
    { id:'ch16', title:'案例研究库', color:'var(--community)', status:1,
      sections:['SEO→GEO转型','冷启动路径','零预算增长','案例索引'] }
  ];

  let activeCh = 0;
  const main = document.getElementById('main');
  const s2Nav = document.getElementById('s2-nav');
  const s2Label = document.getElementById('s2-label');

  // Build chapter pages
  function buildPages() {
    const contentMap = {
      1: buildCh1, 2: buildCh2, 3: buildCh3,
      4: buildCh4, 5: buildCh5, 6: buildCh6, 7: buildCh7
    };
    // Live chapters (1-7)
    for (let i = 1; i <= 7; i++) {
      const page = document.createElement('div');
      page.className = 'ch-page';
      page.id = 'ch' + i;
      page.innerHTML = contentMap[i]();
      main.appendChild(page);
    }
    // Coming Soon chapters (8-16)
    for (let i = 8; i <= 16; i++) {
      const page = document.createElement('div');
      page.className = 'ch-page';
      page.id = 'ch' + i;
      page.innerHTML = buildCS(i);
      main.appendChild(page);
    }
  }

  function csTag(ch) {
    const colors = {8:'var(--pricing)',9:'var(--plg)',10:'var(--community)',11:'var(--growth)',12:'var(--cro)',13:'var(--paid)',14:'#6366f1',15:'var(--plg)',16:'var(--community)'};
    const c = colors[ch] || 'var(--text-muted)';
    return `<div class="cs-block" style="border-color:${c}"><div class="cs-icon"><i class="fas fa-clock" style="color:${c}"></i></div><div class="cs-title" style="color:${c}">🚧 本章正在撰写中</div><div class="cs-desc">${chData[ch].title}——AI 产品增长的关键策略。</div><ul class="cs-toc">` +
      chData[ch].sections.map(s => `<li><span class="dot" style="background:${c}"></span>${s}</li>`).join('') +
      `</ul></div>`;
  }

  function sectionTag(tag, bg, c) { return `<span class="ch-tag" style="background:${bg};color:${c};border:1px solid ${bg.replace('0.1','0.2')};"><i class="fas fa-${tag}"></i> ${c === 'var(--seo)' ? 'SEO' : c === 'var(--geo)' ? 'GEO' : '增长方法'}</span>`; }

  // ===== CHAPTER CONTENT BUILDERS =====
  // These return HTML strings for each chapter

  function buildCh1() {
    return `<div class="ch-header">${sectionTag('code','rgba(14,165,233,0.1)','var(--seo)')}<div class="ch-title">SEO: 技术层优化</div></div>
    <div class="stat-grid"><div class="stat-card"><div class="stat-val" style="color:var(--seo)">2.5s</div><div class="stat-lbl">LCP 目标</div></div><div class="stat-card"><div class="stat-val" style="color:var(--seo)">200ms</div><div class="stat-lbl">INP 目标</div></div><div class="stat-card"><div class="stat-val" style="color:var(--seo)">0.1</div><div class="stat-lbl">CLS 目标</div></div><div class="stat-card"><div class="stat-val" style="color:var(--seo)">70%+</div><div class="stat-lbl">抓取预算影响</div></div></div>
    <h3>抓取与索引</h3><p>确保搜索引擎爬虫能够高效抓取、理解、索引你的内容。这是所有 SEO 工作的基石。</p>
    <h3>AI 爬虫管理</h3><p>随着 AI 搜索引擎的崛起，需要精准控制各类 AI 爬虫的访问行为。</p>
    <div class="table-wrap"><table><thead><tr><th>爬虫</th><th>来源</th><th>推荐策略</th></tr></thead><tbody><tr><td><code>GPTBot</code></td><td>OpenAI</td><td>允许内容页，限制 API</td></tr><tr><td><code>PerplexityBot</code></td><td>Perplexity</td><td>允许抓取</td></tr><tr><td><code>ClaudeBot</code></td><td>Anthropic</td><td>允许主路径</td></tr><tr><td><code>Google-Extended</code></td><td>Google Gemini</td><td>必须允许</td></tr></tbody></table></div>
    <div class="card"><div class="card-icon" style="background:rgba(14,165,233,0.12);color:var(--seo);"><i class="fas fa-file-alt"></i></div><h3>实操模板：robots.txt 策略</h3><pre><code># AI 爬虫精细化管理
User-agent: GPTBot
Allow: /blog/ /guides/
Disallow: /api/ /dashboard/
User-agent: Google-Extended
Allow: /
Sitemap: https://yourdomain.com/sitemap.xml</code></pre></div>
    <div class="divider"></div>
    <h3>Core Web Vitals 诊断修复</h3>
    <div class="card"><div class="card-icon" style="background:rgba(14,165,233,0.12);color:var(--seo);"><i class="fas fa-check-circle"></i></div><h3>技术 SEO 周检查清单</h3><table><thead><tr><th>时间</th><th>任务</th><th>工具</th></tr></thead><tbody><tr><td>周一</td><td>GSC 抓取统计</td><td>Search Console</td></tr><tr><td>周二</td><td>Lighthouse CI</td><td>PageSpeed</td></tr><tr><td>周三</td><td>爬虫审计</td><td>Screaming Frog</td></tr><tr><td>周四</td><td>数据趋势对比</td><td>Looker Studio</td></tr><tr><td>周五</td><td>修复 low-hanging fruit</td><td>—</td></tr></tbody></table></div>
    <div class="divider"></div>
    <h3>结构化数据与网站架构</h3><p>扁平层级、站内链接、面包屑导航、SSR/SSG 优先策略——内容页用 SSG，工具页用 CSR 保留交互。</p>`;
  }

  function buildCh2() {
    return `<div class="ch-header">${sectionTag('pen-fancy','rgba(14,165,233,0.1)','var(--seo)')}<div class="ch-title">SEO: 内容层优化</div></div><p>超越关键词匹配，进入语义搜索与实体优化的时代。</p>

  function buildCS(chIdx) {
    const c = chData[chIdx];
    const colorMap = {8:'var(--pricing)',9:'var(--plg)',10:'var(--community)',11:'var(--growth)',12:'var(--cro)',13:'var(--paid)',14:'#6366f1',15:'var(--plg)',16:'var(--community)'};

    return `<div class="ch-header"><span class="ch-tag" style="background:${col.replace(')','0.1)').replace('var(--','').replace('#6366f1','rgba(99,102,241,0.1)')};color:${col};border:1px solid ${col.replace('rgba(','rgba(').replace(')','0.2)')};"><i class="fas fa-tag"></i> 增长方法</span><div class="ch-title">${c.title}</div></div>
    <div class="cs-block" style="border-color:${col}"><div class="cs-icon"><i class="fas fa-clock" style="color:${col}"></i></div><div class="cs-title" style="color:${col}">🚧 本章正在撰写中</div><div class="cs-desc">内容规划中，敬请期待。</div><ul class="cs-toc">${c.sections.map(s => `<li><span class="dot" style="background:${col}"></span>${s}</li>`).join('')}</ul></div>`;
  }

  // ===== Navigation Logic =====
  const tabs = document.querySelectorAll('.ch-tab');
  const pages = {};

  function showChapter(idx) {
    // Update tabs
    tabs.forEach(t => t.classList.remove('active'));
    tabs.forEach(t => { if (parseInt(t.dataset.ch) === idx) t.classList.add('active'); });
    // Update pages
    document.querySelectorAll('.ch-page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('ch' + idx);
    if (target) target.classList.add('active');
    // Update sidebar (Level 2)
    activeCh = idx;
    updateS2(idx);
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function updateS2(idx) {
    const ch = chData[idx];
    if (!ch || !ch.sections.length || idx === 0) {
      s2Nav.innerHTML = '';
      s2Label.textContent = idx === 0 ? '首页' : '章节内容';
      return;
    }
    const c = idx <= 3 ? 'var(--seo)' : idx <= 7 ? 'var(--geo)' : ch.color;
    s2Label.textContent = ch.title;
    s2Nav.innerHTML = ch.sections.map((s,i) =>
      `<a class="s2-item${i===0?' active':''}" data-s2="${i}" style="${i===0?`border-left-color:${c}`:''}">${s}</a>`
    ).join('');
    // Click to scroll to section headings
    document.querySelectorAll('.s2-item').forEach(a => {
      a.addEventListener('click', function() {
        document.querySelectorAll('.s2-item').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        this.style.borderLeftColor = c;
        // Find matching heading and scroll
        const txt = this.textContent;
        const hs = document.querySelectorAll('#ch'+idx+' h3');
        for (const h of hs) {
          if (h.textContent.includes(txt)) {
            h.scrollIntoView({behavior:'smooth',block:'center'});
            break;
          }
        }
      });
    });
  }

  // Tab click handlers
  tabs.forEach(t => {
    t.addEventListener('click', function() {
      showChapter(parseInt(this.dataset.ch));
    });
  });

  // Init
  buildPages();
  updateS2(0);
})();
