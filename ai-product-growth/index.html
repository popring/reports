<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品增长手册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg:#f4f3ee; --surface:#fff; --surface-hover:#faf9f6; --border:#e4e2dc; --border-raised:#d8d6d0;
  --text:#1a1a1a; --text-secondary:#666; --text-muted:#999;
  --seo:#097abb; --geo:#0d9488; --growth:#d97706; --pricing:#b45309; --plg:#059669; --community:#be185d; --cro:#0e7490; --paid:#dc2626; --i18n:#5b21b6;
  --radius:10px; --sidebar-w:240px; --topbar-h:52px;
  --bg-light:#f4f3ee;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:14px;line-height:1.2}
h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin:28px 0 10px}
h3{font-size:15px;font-weight:600;margin:20px 0 8px;color:var(--text)}
p{font-size:14px;color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text);font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg-light);padding:2px 6px;border-radius:4px;color:var(--seo)}
pre{background:var(--bg-light);border:1px solid var(--border);border-radius:var(--radius);padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--topbar-h);background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.topbar-home{font-size:18px;color:var(--seo);text-decoration:none}
.topbar-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text)}

/* LAYOUT */
.layout{display:flex;margin-top:var(--topbar-h);min-height:calc(100vh - var(--topbar-h))}

/* SIDEBAR - Tree Navigation */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:#fff;border-right:1px solid var(--border);position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;padding:12px 0}
.tree-item{cursor:pointer;user-select:none}
.tree-l1{display:flex;align-items:center;gap:6px;padding:7px 16px 7px 20px;font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .15s}
.tree-l1:hover{background:var(--surface-hover);color:var(--text)}
.tree-l1.active{color:var(--text);border-left-color:var(--seo);background:rgba(14,165,233,0.04);font-weight:600}
.tree-l1.cs{opacity:.45;font-weight:400}
.tree-l1 .arrow{font-size:9px;width:14px;text-align:center;transition:transform .2s;color:var(--text-muted)}
.tree-l1 .arrow.open{transform:rotate(90deg)}
.tree-l1 .icon{font-size:11px;width:16px;text-align:center}
.tree-l1 .status{font-size:9px;margin-left:auto;padding:1px 5px;border-radius:4px;background:var(--bg-light);color:var(--text-muted)}
/* Level 2 */
.tree-l2{display:flex;align-items:center;gap:6px;padding:5px 16px 5px 42px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.tree-l2:hover{color:var(--text-secondary)}
.tree-l2.active{color:var(--seo);border-left-color:var(--seo);font-weight:500}
.sub-wrap{display:none}
.sub-wrap.open{display:block}

/* MAIN */
.main{flex:1;padding:32px 48px 80px;max-width:900px;background:#fff;min-height:100vh}

/* HEADER */
.ch-header{margin-bottom:24px}
.ch-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;padding:3px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ch-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2}

/* CARDS */
.card{background:var(--bg-light);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:16px 0}
.stat-card{background:var(--bg-light);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.table-wrap{overflow-x:auto;margin:12px 0;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg-light);padding:8px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);border-bottom:1px solid var(--border)}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface-hover)}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin:12px 0}
.tool-card{background:var(--bg-light);border:1px solid var(--border);border-radius:6px;padding:10px 12px;transition:all .2s}
.tool-card:hover{transform:translateY(-2px);border-color:var(--border-raised)}
.tc-name{font-weight:600;font-size:12px;margin-bottom:1px}
.tc-desc{font-size:11px;color:var(--text-muted)}
ul,ol{margin:8px 0 16px;padding-left:20px;color:var(--text-secondary);font-size:14px;line-height:1.8}
li{margin-bottom:4px}
.hl{border-radius:var(--radius);padding:16px 20px;margin:16px 0;border:1px solid}
.hl p:last-child{margin-bottom:0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:32px 0}
.cs-block{background:var(--bg-light);border:1px dashed var(--border-raised);border-radius:var(--radius);padding:28px 20px;text-align:center;margin:12px 0}
.cs-icon{font-size:24px;margin-bottom:8px;opacity:.4}
.cs-title{font-size:14px;font-weight:600;margin-bottom:4px}
.cs-desc{font-size:12px;color:var(--text-muted);margin-bottom:12px}
.cs-toc{list-style:none;padding:0;margin:10px auto 0;max-width:380px;text-align:left}
.cs-toc li{font-size:12px;color:var(--text-muted);padding:3px 0;display:flex;align-items:center;gap:6px}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}

/* CHROME SCROLLBAR */
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* RESPONSIVE */
@media(max-width:900px){.sidebar{display:none}.main{padding:24px 20px 60px}}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}.ch-title{font-size:22px}h1{font-size:24px}}

/* ANIMATIONS */
.ch-page{display:none}.ch-page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ch-page.active{animation:fade .25s ease}
</style>
</head>

function csHTML(idx){
  const c = chapterData[idx];
  const colMap = [,,,,'var(--geo)','var(--geo)','var(--geo)','var(--geo)','var(--pricing)','var(--plg)','var(--community)','var(--growth)','var(--cro)','var(--paid)','var(--i18n)','var(--plg)','var(--community)'];
  const col = colMap[idx]||'var(--text-muted)';
  const cTag = idx <= 7 ? (idx <= 3 ? 'SEO' : 'GEO') : '增长方法';
  return `<div class="ch-header"><span class="ch-tag" style="background:rgba(0,0,0,0.04);color:${col};border:1px solid rgba(0,0,0,0.08)"><i class="fas fa-tag"></i> ${cTag}</span><div class="ch-title">${c.title}</div></div>
  <div class="cs-block" style="border-color:${col}"><div class="cs-icon"><i class="fas fa-clock" style="color:${col}"></i></div><div class="cs-title" style="color:${col}">🚧 本章正在撰写中</div><div class="cs-desc">内容规划中，敬请期待。</div><ul class="cs-toc">${c.sections.map(s=>'<li><span class="dot" style="background:'+col+'"></span>'+s+'</li>').join('')}</ul></div>`;
}

const contentBuilders = {
  0: heroHTML, 1: ch1HTML, 2: ch2HTML, 3: ch3HTML,
  4: ch4HTML, 5: ch5HTML, 6: ch6HTML, 7: ch7HTML
};
for(let i=8;i<=16;i++) contentBuilders[i] = ()=>{return csHTML(i);};

// Build sidebar tree
function buildSidebar(){
  const sb = document.getElementById('sidebar');
  let html = '<div style="padding:8px 16px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)"><i class="fas fa-list"></i> 目录</div>';
  chapterData.forEach((ch,i)=>{
    if(i===0) return;
    const col = i<=3?'var(--seo)':i<=7?'var(--geo)':ch.color;
    const arrow = ch.sections.length ? '<span class="arrow" data-arrow="'+i+'"><i class="fas fa-chevron-right"></i></span>' : '';
    const icon = '<span class="icon"><i class="fas '+ch.icon+'" style="color:'+col+'"></i></span>';
    const nm = ch.title.length > 12 ? ch.title.slice(0,12)+'…' : ch.title;
    const st = ch.cs ? '<span class="status">CS</span>' : '';
    html += '<div class="tree-item" data-ch="'+i+'"><div class="tree-l1'+(ch.cs?' cs':'')+'" data-ch="'+i+'">'+arrow+icon+'<span>'+nm+'</span>'+st+'</div>';
    if(ch.sections.length && !ch.cs){
      html += '<div class="sub-wrap" data-sub="'+i+'">';
      ch.sections.forEach((s,j)=>{
        html += '<div class="tree-l2" data-ch="'+i+'" data-s2="'+j+'"><span>'+s+'</span></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  sb.innerHTML = html;
}

// Page storage
const main = document.getElementById('main');
let pagesBuilt = false;
function buildPages(){
  if(pagesBuilt) return;
  chapterData.forEach((ch,i)=>{
    const div = document.createElement('div');
    div.className = 'ch-page';
    div.id = 'page-'+i;
    div.innerHTML = contentBuilders[i]();
    main.appendChild(div);
  });
  pagesBuilt = true;
}

function showChapter(idx, s2Idx){
  // Update pages
  document.querySelectorAll('.ch-page').forEach(p=>p.classList.remove('active'));
  const target = document.getElementById('page-'+idx);
  if(target) target.classList.add('active');

  // Update sidebar L1
  activeCh = idx;
  document.querySelectorAll('.tree-l1').forEach(el=>{
    el.classList.remove('active');
    if(parseInt(el.dataset.ch)===idx) el.classList.add('active');
  });

  // Handle sub-menu expansion
  document.querySelectorAll('.sub-wrap').forEach(w=>{
    w.classList.remove('open');
    w.querySelectorAll('.tree-l2').forEach(x=>x.classList.remove('active'));
  });
  document.querySelectorAll('.arrow').forEach(a=>a.classList.remove('open'));

  const sub = document.querySelector('.sub-wrap[data-sub="'+idx+'"]');
  const arrow = document.querySelector('[data-arrow="'+idx+'"]');
  if(sub) {
    sub.classList.add('open');
    if(arrow) arrow.classList.add('open');
  }

  // Select sub-section
  if(s2Idx !== undefined && s2Idx >= 0){
    const s2 = document.querySelector('[data-s2="'+s2Idx+'"][data-ch="'+idx+'"]');
    if(s2){
      document.querySelectorAll('.tree-l2[data-ch="'+idx+'"]').forEach(x=>x.classList.remove('active'));
      s2.classList.add('active');
    }
  }
}

// Init
buildSidebar();
buildPages();
showChapter(0);

// Event delegation for sidebar
document.getElementById('sidebar').addEventListener('click', function(e){
  const l1 = e.target.closest('.tree-l1');
  const l2 = e.target.closest('.tree-l2');
  const arrow = e.target.closest('.arrow');

  if(arrow){
    const idx = parseInt(arrow.parentElement.dataset.ch);
    const sub = document.querySelector('.sub-wrap[data-sub="'+idx+'"]');
    if(sub){
      sub.classList.toggle('open');
      arrow.classList.toggle('open');
    }
    return;
  }

  if(l2){
    const ch = parseInt(l2.dataset.ch);
    const s2 = parseInt(l2.dataset.s2);
    showChapter(ch, s2);
    return;
  }

  if(l1 && !l1.classList.contains('cs')){
    const idx = parseInt(l1.dataset.ch);
    showChapter(idx);
  }
});

})();
</script>
