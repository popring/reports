<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 产品增长手册</title>
<meta name="description" content="AI 产品的系统性增长指南">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root,[data-theme=light]{--bg:#f6f5f1;--bg-sidebar:#faf9f5;--surface:#fff;--surface-hover:#f3f2ed;--border:#e2e0da;--border-raised:#d4d2cc;--text:#1c1b1a;--text-secondary:#5c5b58;--text-muted:#8f8e8b;--accent:#097abb;--accent2:#0d9488}
[data-theme=dark]{--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--border-raised:#47474b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--text-dim:#4c4c50;--accent:#4bb4e6;--accent2:#34d1c4}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]):not([data-theme=dark]){--bg:#1a1a1e;--bg-sidebar:#1f1f23;--surface:#27272b;--surface-hover:#2f2f33;--border:#37373b;--border-raised:#47474b;--text:#e6e6e8;--text-secondary:#9c9ca0;--text-muted:#6c6c70;--text-dim:#4c4c50;--accent:#4bb4e6;--accent2:#34d1c4}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.2;color:var(--text)}
h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin:24px 0 10px;color:var(--text)}
h3{font-size:15px;font-weight:600;margin:18px 0 8px;color:var(--text)}
p{font-size:14px;color:var(--text-secondary);margin-bottom:12px;line-height:1.8}
strong{color:var(--text);font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface);padding:2px 6px;border-radius:4px;color:var(--accent)}
pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:12px 0;font-size:12px;line-height:1.6}
pre code{background:none;padding:0;color:var(--text-secondary)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.topbar-home{color:var(--accent);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
.theme-toggle{margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);padding:6px 10px;font-size:13px;cursor:pointer}
.theme-toggle:hover{border-color:var(--border-raised);color:var(--text)}
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sidebar{width:260px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:10px 0}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Group (L1) */
.gr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 20px 4px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.gr .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
/* Chapter (L2) */
.tr{cursor:pointer;user-select:none}
.l2{display:flex;align-items:center;gap:5px;padding:5px 16px 5px 28px;font-size:13px;font-weight:500;color:var(--text-secondary);border-left:3px solid transparent;transition:all .12s}
.l2:hover{background:var(--surface-hover);color:var(--text)}
.l2.active{color:var(--text);font-weight:600;background:var(--surface);border-left-color:var(--accent)}
.l2.cs{opacity:.45}
.l2 .ar{font-size:8px;width:12px;text-align:center;color:var(--text-dim);transition:transform .2s}
.l2 .ar.open{transform:rotate(90deg)}
.l2 .ico{font-size:11px;width:14px;text-align:center;flex-shrink:0}
/* Section (L3) */
.l3{display:flex;align-items:center;padding:3px 16px 3px 50px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.l3:hover{color:var(--text-secondary)}
.l3.active{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sw{display:none}.sw.open{display:block}
.main{flex:1;padding:28px 44px 80px;max-width:920px;background:var(--surface);min-height:calc(100vh - 52px)}
.ch-page{display:none;animation:fade .22s ease}.ch-page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ch-header{margin-bottom:20px}
.ch-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;padding:3px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
.ch-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.15;color:var(--text)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.card-header{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.5px}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:4px}
.table-wrap{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);border-bottom:1px solid var(--border)}
tbody td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
tbody tr:last-child td{border-bottom:none}tbody tr:hover td{background:var(--surface-hover)}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin:10px 0}
.tool-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.tc-name{font-weight:600;font-size:12px}.tc-desc{font-size:11px;color:var(--text-muted)}
ul,ol{margin:8px 0 14px;padding-left:20px;color:var(--text-secondary);font-size:14px;line-height:1.8}
li{margin-bottom:4px}
.hl{border-radius:8px;padding:16px 18px;margin:14px 0;border:1px solid}.hl p:last-child{margin-bottom:0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:28px 0}
.cs-block{background:var(--bg);border:1px dashed var(--border-raised);border-radius:8px;padding:24px 20px;text-align:center;margin:12px 0}
.cs-icon{font-size:24px;margin-bottom:6px;opacity:.35}.cs-title{font-size:14px;font-weight:600;margin-bottom:4px}.cs-desc{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.cs-toc{list-style:none;padding:0;margin:8px auto 0;max-width:360px;text-align:left}
.cs-toc li{font-size:12px;color:var(--text-muted);padding:3px 0;display:flex;align-items:center;gap:6px}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
@media(max-width:900px){.sidebar{display:none}.main{padding:24px 18px 60px}}
@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}.ch-title{font-size:20px}h1{font-size:22px}}
</style>
</head>
<body>
<div class="topbar">
  <a class="topbar-home" href="../../"><i class="fas fa-arrow-left"></i><span> 报告索引</span></a>
  <span class="topbar-title">AI 产品增长手册</span>
  <button class="theme-toggle" id="themeToggle" title="切换主题"><i class="fas fa-moon"></i></button>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
<script>
(function(){
'use strict';

// Theme
(function(){const s=localStorage.getItem('t');if(s)document.documentElement.setAttribute('data-theme',s);const b=document.getElementById('themeToggle');b.addEventListener('click',()=>{const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':c==='light'?'system':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('t',n);const i=b.querySelector('i');i.className=n==='dark'?'fas fa-sun':n==='light'?'fas fa-sun-bright':'fas fa-desktop'})})();

// ===== STRUCTURE: 3-level hierarchy =====
const G = [
  { title:'SEO', dot:'#097abb',
    kids:[
      { slug:'seo-tech', title:'技术优化', ico:'fa-code',
        S:[{sl:'crawl-index',t:'抓取与索引'},{sl:'ai-crawlers',t:'AI爬虫管理'},{sl:'sitemaps',t:'XML Sitemaps'},{sl:'core-web-vitals',t:'Core Web Vitals'},{sl:'schema',t:'结构化数据'},{sl:'architecture',t:'网站架构'},{sl:'ssr-ssg',t:'SSR/SSG验证'},{sl:'checklist',t:'周检查清单'}]},
      { slug:'seo-content', title:'内容优化', ico:'fa-pen-fancy',
        S:[{sl:'semantic-search',t:'语义搜索'},{sl:'topic-clusters',t:'主题集群'},{sl:'eeat',t:'E-E-A-T框架'},{sl:'entity',t:'实体优化'},{sl:'featured-snippets',t:'Featured Snippets'},{sl:'case-miro',t:'案例: Miro'}]},
      { slug:'sge', title:'SGE / AI Overviews', ico:'fa-robot',
        S:[{sl:'overview',t:'AI Overviews现状'},{sl:'factors',t:'被引用因素'},{sl:'traffic-erosion',t:'流量侵蚀应对'},{sl:'testing',t:'SGE触发测试'},{sl:'case-faq',t:'案例: FAQ Schema'}]}
    ]},
  { title:'GEO', dot:'#0d9488',
    kids:[
      { slug:'geo-overview', title:'概述', ico:'fa-globe',
        S:[{sl:'definition',t:'GEO定义'},{sl:'seo-vs-geo',t:'SEO vs GEO'},{sl:'engine-ecosystem',t:'AI引擎生态'},{sl:'rag-pipeline',t:'RAG管道'},{sl:'baseline-test',t:'引用率测试'}]},
      { slug:'geo-content', title:'内容策略', ico:'fa-file-alt',
        S:[{sl:'answer-first',t:'Answer-First'},{sl:'claim-based',t:'Claim-Based'},{sl:'fact-density',t:'事实密度'},{sl:'before-after',t:'改写案例'}]},
      { slug:'geo-tech', title:'技术实现', ico:'fa-cogs',
        S:[{sl:'semantic-html',t:'语义HTML'},{sl:'jsonld',t:'Schema模板'},{sl:'rag-optimization',t:'RAG优化'},{sl:'langchain',t:'LangChain模拟'}]},
      { slug:'geo-metrics', title:'度量与工具', ico:'fa-chart-line',
        S:[{sl:'kpi',t:'核心指标'},{sl:'tracker',t:'追踪表'},{sl:'tools',t:'工具'}]}
    ]},
  { title:'更多增长方法', dot:'#d97706',
    kids:[
      { slug:'pricing', title:'AI产品定价', ico:'fa-tag', cs:1, S:[{sl:'models',t:'定价模型'},{sl:'freemium',t:'免费增值'}]},
      { slug:'plg', title:'PLG增长', ico:'fa-rocket', cs:1, S:[{sl:'funnel',t:'PLG漏斗'},{sl:'activation',t:'激活率'}]},
      { slug:'community', title:'社区驱动增长', ico:'fa-users', cs:1, S:[{sl:'cold-start',t:'冷启动'},{sl:'ugc',t:'UGC激励'}]},
      { slug:'content-matrix', title:'内容营销矩阵', ico:'fa-newspaper', cs:1, S:[{sl:'blog',t:'技术博客'},{sl:'distribution',t:'多平台'}]},
      { slug:'cro', title:'转化率优化', ico:'fa-chart-bar', cs:1, S:[{sl:'signup',t:'注册流程'},{sl:'ab-testing',t:'A/B测试'}]},
      { slug:'paid', title:'付费增长', ico:'fa-ad', cs:1, S:[{sl:'search',t:'搜索广告'},{sl:'social',t:'社媒广告'},{sl:'roi',t:'ROI'}]},
      { slug:'i18n', title:'国际化增长', ico:'fa-globe-asia', cs:1, S:[{sl:'ml-seo',t:'多语言SEO'},{sl:'localization',t:'本地化'}]},
      { slug:'data', title:'数据驱动增长', ico:'fa-database', cs:1, S:[{sl:'dashboard',t:'仪表板'},{sl:'experiments',t:'实验框架'}]},
      { slug:'case-studies', title:'案例研究库', ico:'fa-flask', cs:1, S:[{sl:'seo-geo',t:'转型案例'},{sl:'zero-budget',t:'零预算'}]}
    ]}
];

// Flat index for routing: {g: groupIdx, k: kidIdx}
function kidIdx(slug){
  for(let g=0;g<G.length;g++)
    for(let k=0;k<G[g].kids.length;k++)
      if(G[g].kids[k].slug===slug) return {g,k};
  return null;
}

// Hash routing
function getRoute(){
  const h=location.hash.replace('#/','').replace(/\/$/,'');
  if(!h)return{g:-1,k:-1,s2:-1};
  const p=h.split('/');
  const ki=kidIdx(p[0]);
  if(!ki)return{g:-1,k:-1,s2:-1};
  const kid=G[ki.g].kids[ki.k];
  if(!p[1]||!kid.S)return{g:ki.g,k:ki.k,s2:-1};
  const si=kid.S.findIndex(s=>s.sl===p[1]);
  return{g:ki.g,k:ki.k,s2:si>=0?si:-1};
}

function pushRoute(g,k,s2){
  // Hero page
  if(g<0||k<0){location.hash='';document.title='AI 产品增长手册';return;}
  const kid=G[g].kids[k];
  const s=s2>=0&&kid.S[s2]?kid.S[s2].sl:'';
  location.hash='/'+kid.slug+(s?'/'+s:'');
  const st=s2>=0&&kid.S[s2]?kid.S[s2].t+' · ':'';
  document.title=st+kid.title+' · AI 产品增长手册';
}

// ===== CONTENT =====
function tag(c){return'<span class="ch-tag" style="background:'+(c==='#097abb'?'rgba(9,122,187,0.08);color:#097abb;border-color:rgba(9,122,187,0.15)':c==='#0d9488'?'rgba(13,148,136,0.08);color:#0d9488;border-color:rgba(13,148,136,0.15)':'color-mix(in srgb,'+c+'10%,transparent);color:'+c+';border-color:color-mix(in srgb,'+c+'18%,transparent)')+'">'}
function ico(c){return'<i class="fas '+c+'"></i> '}

function heroHTML(){return'<div style="min-height:70vh;display:flex;flex-direction:column;justify-content:center;max-width:560px">'+tag('#097abb')+ico('fa-book-open')+'综合指南</span><h1 style="font-size:clamp(30px,5vw,48px);">AI 产品<br><span style="background:linear-gradient(135deg,#097abb,#0d9488);-webkit-background-clip:text;background-clip:text;color:transparent;">增长手册</span></h1><p style="font-size:15px;color:var(--text-secondary);margin-bottom:18px">从传统搜索优化到生成式引擎优化，从定价策略到社区驱动增长——一本持续更新的AI产品系统性增长指南。</p><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--text-muted)"><span><i class="far fa-file-alt"></i> 16章</span><span><i class="fas fa-sync-alt"></i> 持续更新</span></div></div>';}

var CT={
'seo-tech':function(){return'<div class="ch-header">'+tag('#097abb')+ico('fa-code')+'SEO</span><div class="ch-title">技术优化</div></div><p>搜索引擎爬虫通过抓取你的HTML来理解页面内容。如果技术层面出了问题，内容再好也无法被索引。</p><div class="stat-grid"><div class="stat-card"><div class="stat-val" style="color:#097abb">2.5s</div><div class="stat-lbl">LCP</div></div><div class="stat-card"><div class="stat-val" style="color:#097abb">200ms</div><div class="stat-lbl">INP</div></div><div class="stat-card"><div class="stat-val" style="color:#097abb">0.1</div><div class="stat-lbl">CLS</div></div></div><h3>抓取与索引</h3><p>all重要页面在GSC中显示"已索引"，robots.txt没有误封。</p><h3>AI爬虫管理</h3><div class="table-wrap"><table><thead><tr><th>爬虫</th><th>来源</th><th>策略</th></tr></thead><tbody><tr><td><code>GPTBot</code></td><td>OpenAI</td><td>允许内容页</td></tr><tr><td><code>Google-Extended</code></td><td>Google</td><td><strong>必须允许</strong></td></tr><tr><td><code>PerplexityBot</code></td><td>Perplexity</td><td>允许</td></tr><tr><td><code>ClaudeBot</code></td><td>Anthropic</td><td>允许</td></tr></tbody></table></div><div class="card"><div class="card-header" style="color:#097abb">robots.txt模板</div><pre><code>User-agent: GPTBot\nAllow: /blog/ /guides/\nDisallow: /api/ /dashboard/\nUser-agent: Google-Extended\nAllow: /</code></pre></div><h3>SSR/SSG决策与验证</h3><p><strong>AI产品最常见的SEO陷阱。</strong>大部分AI工具使用React/Next.js，默认CSR可能让爬虫看到空白页。</p><div class="table-wrap"><table><thead><tr><th>方案</th><th>SEO</th><th>适用</th></tr></thead><tbody><tr><td><strong>CSR</strong></td><td>❌</td><td>工具页</td></tr><tr><td><strong>SSR</strong></td><td>✅✅✅</td><td>内容页</td></tr><tr><td><strong>SSG</strong></td><td>✅✅✅</td><td>博客</td></tr></tbody></table></div><div class="card"><div class="card-header" style="color:#097abb">curl模拟Googlebot</div><pre><code>curl -A "Mozilla/5.0 (compatible; Googlebot/2.1)" \\\n  https://domain.com/page | grep "&lt;article\\|&lt;main\\|&lt;h1"</code></pre></div><div class="card"><div class="card-header" style="color:#097abb">GSC URL Inspection</div><pre><code>Search Console → URL Inspection → 测试已发布的网址\n→ 查看"Google看到的HTML"\n✅ 有真实内容而非空的JS入口</code></pre></div><div class="card"><div class="card-header" style="color:#097abb">SSR验证清单</div><table><thead><tr><th>#</th><th>检查项</th></tr></thead><tbody><tr><td>1</td><td>curl Googlebot返回正文</td></tr><tr><td>2</td><td>禁用JS后可阅读</td></tr><tr><td>3</td><td>GSC显示完整HTML</td></tr><tr><td>4</td><td>JSON-LD在服务端HTML中存在</td></tr></tbody></table></div><h3>结构化数据</h3><p><code>FAQPage</code> (⭐⭐⭐⭐⭐)、<code>HowTo</code> (⭐⭐⭐⭐⭐)、<code>SoftwareApplication</code> (⭐⭐⭐⭐⭐)、<code>Article</code> (⭐⭐⭐⭐)。</p>';},
'seo-content':function(){return'<div class="ch-header">'+tag('#097abb')+ico('fa-pen-fancy')+'SEO</span><div class="ch-title">内容优化</div></div><div class="table-wrap"><table><thead><tr><th>意图</th><th>策略</th></tr></thead><tbody><tr><td>信息型</td><td>定义+解释+引用</td></tr><tr><td>导航型</td><td>品牌页</td></tr><tr><td>商业调查</td><td>对比+功能</td></tr><tr><td>交易型</td><td>产品页</td></tr></tbody></table></div><h3>主题集群</h3><div class="card"><ol style="margin:0"><li>关键词挖掘—Ahrefs Top50</li><li>主题聚类</li><li>Pillar Page 2000+词</li><li>Cluster 5-10篇</li><li>内链矩阵</li></ol></div><h3>E-E-A-T</h3><p>经验·专业·权威·信任。每页有作者署名。</p><h3>Featured Snippets</h3><p>40-60字直接回答放在H2后。</p><div class="hl" style="background:color-mix(in srgb,#d97706 6%,transparent);border-color:color-mix(in srgb,#d97706 18%,transparent)"><h4>📊 Miro案例</h4><p>300+ Use Case页面，每篇固定模板。3年流量<strong>15x</strong>增长。</p></div>';},

function csHTML(kid,c){
  return'<div class="ch-header">'+tag(c)+ico(kid.ico||'fa-tag')+'增长方法</span><div class="ch-title">'+kid.title+'</div></div><div class="cs-block" style="border-color:'+c+'"><div class="cs-icon"><i class="fas fa-clock" style="color:'+c+'"></i></div><div class="cs-title" style="color:'+c+'">🚧 正在撰写</div><ul class="cs-toc">'+kid.S.map(s=>'<li><span class="dot" style="background:'+c+'"></span>'+s.t+'</li>').join('')+'</ul></div>';
}

// ===== BUILD =====
var main=document.getElementById('main'),sb=document.getElementById('sidebar');
var colMap={'#097abb':'#097abb','#0d9488':'#0d9488','#d97706':'#d97706'};

// Build sidebar
function buildSidebar(){
  var h='<div class="sidebar-label"><i class="fas fa-list"></i> 目录</div>';
  G.forEach(function(g,gi){
    h+='<div class="gr"><span class="dot" style="background:'+g.dot+'"></span> '+g.title+'</div>';
    g.kids.forEach(function(kid,ki){
      var ar=kid.S.length?'<span class="ar" data-gi="'+gi+'" data-ki="'+ki+'"><i class="fas fa-chevron-right"></i></span>':'';
      var io='<span class="ico"><i class="fas '+kid.ico+'" style="color:'+g.dot+'"></i></span>';
      var csb=kid.cs?'<span class="badge-cs">CS</span>':'';
      h+='<div class="tr"><div class="l2'+(kid.cs?' cs':'')+'" data-g="'+gi+'" data-k="'+ki+'">'+ar+io+'<span>'+kid.title+'</span>'+csb+'</div>';
      if(kid.S.length&&!kid.cs){
        h+='<div class="sw" data-sw="'+gi+'-'+ki+'">';
        kid.S.forEach(function(s,sj){h+='<div class="l3" data-g="'+gi+'" data-k="'+ki+'" data-s="'+sj+'">'+s.t+'</div>';});
        h+='</div>';
      }
      h+='</div>';
    });
  });
  sb.innerHTML=h;
}
buildSidebar();

// Build content pages
function buildContent(){
  main.innerHTML='<div class="ch-page active" id="ph">'+heroHTML()+'</div>';
  G.forEach(function(g,gi){
    g.kids.forEach(function(kid,ki){
      var d=document.createElement('div');d.className='ch-page';d.id='p'+gi+'-'+ki;
      d.innerHTML=kid.cs?csHTML(kid,g.dot):(CT[kid.slug]?CT[kid.slug]():'<p>内容加载中</p>');
      main.appendChild(d);
    });
  });
}
buildContent();

// Navigation
function nav(gi,ki,s2){
  // Show page
  document.querySelectorAll('.ch-page').forEach(function(p){p.classList.remove('active');});
  var pid='p'+gi+'-'+ki;
  var pg=document.getElementById(pid);
  if(!pg)pg=document.getElementById('ph');
  if(pg)pg.classList.add('active');
  // Update L2
  document.querySelectorAll('.l2').forEach(function(el){el.classList.remove('active');if(parseInt(el.dataset.g)===gi&&parseInt(el.dataset.k)===ki)el.classList.add('active');});
  // Subs
  document.querySelectorAll('.sw').forEach(function(w){w.classList.remove('open');w.querySelectorAll('.l3').forEach(function(x){x.classList.remove('active');});});
  document.querySelectorAll('.ar').forEach(function(a){a.classList.remove('open');});
  var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');
  var ar=document.querySelector('[data-gi="'+gi+'"][data-ki="'+ki+'"]');
  if(sw){sw.classList.add('open');if(ar)ar.classList.add('open');}
  // L3
  if(s2!==undefined&&s2>=0){
    var el=document.querySelector('.l3[data-g="'+gi+'"][data-k="'+ki+'"][data-s="'+s2+'"]');
    if(el){document.querySelectorAll('.l3[data-g="'+gi+'"][data-k="'+ki+'"]').forEach(function(x){x.classList.remove('active');});el.classList.add('active');}
  }
  pushRoute(gi,ki,s2);
  // Scroll content to top
  main.scrollTop=0;window.scrollTo({top:0,behavior:'smooth'});
}

// Track current nav to avoid hash loop
var curNav={g:-1,k:-1,s2:-1};

// Route on load
var r=getRoute();
curNav={g:r.g,k:r.k,s2:r.s2};
nav(r.g,r.k,r.s2);

// Click delegation
sb.addEventListener('click',function(e){
  var l2=e.target.closest('.l2');
  var l3=e.target.closest('.l3');
  var ar=e.target.closest('.ar');
  if(ar){var gi=parseInt(ar.dataset.gi),ki=parseInt(ar.dataset.ki);var sw=document.querySelector('.sw[data-sw="'+gi+'-'+ki+'"]');if(sw){sw.classList.toggle('open');ar.classList.toggle('open');}return;}
  if(l3){nav(parseInt(l3.dataset.g),parseInt(l3.dataset.k),parseInt(l3.dataset.s));return;}
  if(l2&&!l2.classList.contains('cs'))nav(parseInt(l2.dataset.g),parseInt(l2.dataset.k));
});

window.addEventListener('hashchange',function(){
  var r2=getRoute();
  // Prevent double-navigation: skip if already at this route
  if(r2.g===curNav.g&&r2.k===curNav.k&&r2.s2===curNav.s2)return;
  curNav={g:r2.g,k:r2.k,s2:r2.s2};
  nav(r2.g,r2.k,r2.s2);
});
})();
</script>
